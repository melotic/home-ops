---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Kyverno"

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  pre-job:
    name: Pre-Job
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 20

      - name: Get Changed Files
        id: changed
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          base: ${{ github.event.repository.default_branch }}
          filters: |
            any_changed:
              - "kubernetes/**"
              - "talos/**"
              - "bootstrap/**"
              - "cluster*.yaml"
              - "nodes*.yaml"
              - ".github/workflows/kyverno.yaml"

  test:
    name: Test
    needs: pre-job
    runs-on: ubuntu-latest
    if: ${{ needs.pre-job.outputs.any_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Kyverno CLI
        uses: kyverno/action-install-cli@fcee92fca5c883169ef9927acf543e0b5fc58289 # v0.2.0
        with:
          release: v1.17.2

      - name: Run kyverno test
        run: kyverno test kubernetes/apps/kyverno/policies/tests/

  validate:
    name: Validate
    needs: pre-job
    runs-on: ubuntu-latest
    if: ${{ needs.pre-job.outputs.any_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Kyverno CLI
        uses: kyverno/action-install-cli@fcee92fca5c883169ef9927acf543e0b5fc58289 # v0.2.0
        with:
          release: v1.17.2

      - name: Render manifests with flux-local
        uses: docker://ghcr.io/allenporter/flux-local:v8.3.0
        with:
          args: >-
            build all
            --enable-helm
            --skip-invalid-kustomization-paths
            --output-file /github/workspace/rendered.yaml
            /github/workspace/kubernetes/flux/cluster

      - name: Run kyverno apply
        run: |
          set -euo pipefail
          {
            echo '### Kyverno Validate'
            echo ''
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          kyverno apply kubernetes/apps/kyverno/policies/app/ \
            --resource "${GITHUB_WORKSPACE}/rendered.yaml" \
            --audit-warn \
            --warn-exit-code 0 \
            --continue-on-fail \
            --table \
            --remove-color \
            | tee -a "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"

      - name: Run registry allowlist gate
        run: |
          set -euo pipefail
          {
            echo ''
            echo '### Registry Allowlist Gate'
            echo ''
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          kyverno apply kubernetes/apps/kyverno/policies/app/08-require-image-registry-allowlist.yaml \
            --resource "${GITHUB_WORKSPACE}/rendered.yaml" \
            --table \
            --remove-color \
            | tee -a "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"

  kyverno-status:
    name: Success
    needs: ["pre-job", "test", "validate"]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Required jobs passed?
        if: ${{ needs.pre-job.result != 'success' || (needs.pre-job.outputs.any_changed == 'true' && (needs.test.result != 'success' || needs.validate.result != 'success')) }}
        run: exit 1

      - name: Kyverno checks complete
        run: echo "${{ toJSON(needs.*.result) }}"
