---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "YAML Format"

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  pre-job:
    name: Pre-Job
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 20

      - name: Get Changed Files
        id: changed
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          base: ${{ github.event.repository.default_branch }}
          filters: |
            any_changed:
              - "**/*.yaml"
              - "**/*.yml"
              - ".yamlfmt.yaml"
              - ".github/workflows/yamlfmt.yaml"

  lint:
    name: Lint
    needs: pre-job
    runs-on: ubuntu-latest
    if: ${{ needs.pre-job.outputs.any_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: false
          install_args: "aqua:google/yamlfmt"

      - name: Run yamlfmt lint
        run: yamlfmt -lint

  yamlfmt-status:
    name: Success
    needs: ["pre-job", "lint"]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Required jobs passed?
        if: ${{ needs.pre-job.result != 'success' || (needs.pre-job.outputs.any_changed == 'true' && needs.lint.result != 'success') }}
        run: exit 1

      - name: All jobs passed or skipped?
        run: echo "${{ toJSON(needs.*.result) }}"
