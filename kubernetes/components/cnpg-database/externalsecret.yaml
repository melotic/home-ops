---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-postgres"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: "${APP}-postgres"
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        dbname: "${PG_DATABASE}"
        host: "${PG_HOST}"
        jdbc-uri: "jdbc:postgresql://${PG_HOST}:5432/${PG_DATABASE}?password={{ .password }}&user=${PG_USER}"
        password: "{{ .password }}"
        pgpass: "${PG_HOST}:5432:${PG_DATABASE}:${PG_USER}:{{ .password }}"
        port: "5432"
        uri: "postgresql://${PG_USER}:{{ .password }}@${PG_HOST}:5432/${PG_DATABASE}"
        user: "${PG_USER}"
        username: "${PG_USER}"
  dataFrom:
    - extract:
        key: "${ONEPASSWORD_ITEM}"
