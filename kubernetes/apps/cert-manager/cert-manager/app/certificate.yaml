---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: buildkit-ca
spec:
  commonName: buildkit-ca
  isCA: true
  issuerRef:
    kind: ClusterIssuer
    name: buildkit-selfsigned
  privateKey:
    algorithm: ECDSA
    size: 256
  secretName: buildkit-ca
