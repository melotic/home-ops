---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cert-manager-rules
spec:
  groups:
    - name: cert-manager
      rules:
        - alert: CertManagerAbsent
          annotations:
            description: New certificates will not be able to be minted, and existing ones can't be renewed until cert-manager is back.
            runbook_url: https://github.com/imusmanmalik/cert-manager-mixin/blob/main/RUNBOOK.md#certmanagerabsent
            summary: Cert Manager has disappeared from Prometheus service discovery.
          expr: absent(up{job="cert-manager"})
          for: 10m
          labels:
            severity: critical
    - name: certificates
      rules:
        - alert: CertManagerCertExpirySoon
          annotations:
            description: The cert is either overdue for renewal and under 21 days from expiry, or under 3 days from expiry regardless of renewal state. Clients using endpoints that this cert protects will start to fail in {{ $value | humanizeDuration }}.
            runbook_url: https://github.com/imusmanmalik/cert-manager-mixin/blob/main/RUNBOOK.md#certmanagercertexpirysoon
            summary: The cert `{{ $labels.name }}` expires in {{ $value | humanizeDuration }}.
          # Fire only when a cert is near expiry AND its renewal is actually overdue
          # (renewal timestamp already passed), so certs with a shorter renewBefore
          # than the 21d window (e.g. the barman-cloud self-signed certs, renewBefore
          # 360h) don't false-positive while waiting for their scheduled renewal.
          # A hard <3d expiry backstop still fires regardless of the renewal metric.
          expr: |
            (
              (
                avg by (exported_namespace, namespace, name) (
                  certmanager_certificate_expiration_timestamp_seconds - time()
                ) < (21 * 24 * 3600)
              )
              and on (exported_namespace, namespace, name)
              (
                avg by (exported_namespace, namespace, name) (
                  certmanager_certificate_renewal_timestamp_seconds - time()
                ) < 0
              )
            )
            or
            (
              avg by (exported_namespace, namespace, name) (
                certmanager_certificate_expiration_timestamp_seconds - time()
              ) < (3 * 24 * 3600)
            )
          for: 1h
          labels:
            severity: critical
        - alert: CertManagerCertNotReady
          annotations:
            description: This certificate has not been ready to serve traffic for at least 10m. If the cert is being renewed or there is another valid cert, the ingress controller _may_ be able to serve that instead.
            runbook_url: https://github.com/imusmanmalik/cert-manager-mixin/blob/main/RUNBOOK.md#certmanagercertnotready
            summary: The cert `{{ $labels.name }}` is not ready to serve traffic.
          expr: |
            max by (name, exported_namespace, namespace, condition) (
              certmanager_certificate_ready_status{condition!="True"} == 1
            )
          for: 10m
          labels:
            severity: critical
        - alert: CertManagerHittingRateLimits
          annotations:
            description: Depending on the rate limit, cert-manager may be unable to generate certificates for up to a week.
            runbook_url: https://github.com/imusmanmalik/cert-manager-mixin/blob/main/RUNBOOK.md#certmanagerhittingratelimits
            summary: Cert manager hitting LetsEncrypt rate limits.
          expr: |
            sum by (host) (
              rate(certmanager_http_acme_client_request_count{status="429"}[5m])
            ) > 0
          for: 5m
          labels:
            severity: critical
