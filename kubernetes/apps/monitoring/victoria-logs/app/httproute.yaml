---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: victoria-logs
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - victoria-logs.melotic.dev
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /select/vmui/
            statusCode: 302
      matches:
        - path:
            type: Exact
            value: /
    - backendRefs:
        - name: victoria-logs-server
          port: 9428
      matches:
        - path:
            type: PathPrefix
            value: /
