---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    receiver: blackhole
    groupBy: ["alertname", "job"]
    groupWait: 1m
    groupInterval: 10m
    repeatInterval: 12h
    routes:
      - receiver: pushover
        matchers:
          - name: severity
            value: critical
            matchType: =
        continue: true
      - receiver: pushover
        matchers:
          - name: severity
            value: warning
            matchType: =
        continue: true
      - receiver: pushover
        matchers:
          - name: severity
            value: error
            matchType: =
        continue: true
      - receiver: webhook
        matchers:
          - name: severity
            value: critical|warning|error
            matchType: =~
  inhibitRules:
    - equal: ["namespace", "alertname"]
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning|info
          matchType: =~
  receivers:
    - name: blackhole
    - name: pushover
      pushoverConfigs:
        - html: true
          sendResolved: true
          sound: gamelan
          ttl: 86400s
          priority: '{{ if eq .Status "firing" }}1{{ else }}0{{ end }}'
          title: >-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}]
            {{ .CommonLabels.alertname }}
          message: |-
            {{- range .Alerts }}
              {{- if ne .Annotations.description "" }}
                {{ .Annotations.description }}
              {{- else if ne .Annotations.summary "" }}
                {{ .Annotations.summary }}
              {{- else if ne .Annotations.message "" }}
                {{ .Annotations.message }}
              {{- else }}
                Alert description not available
              {{- end }}
              {{- if gt (len .Labels.SortedPairs) 0 }}
                <small>
                  {{- range .Labels.SortedPairs }}
                    <b>{{ .Name }}:</b> {{ .Value }}
                  {{- end }}
                </small>
              {{- end }}
            {{- end }}
          token:
            name: alertmanager-secret
            key: PUSHOVER_API_TOKEN
          userKey:
            name: alertmanager-secret
            key: PUSHOVER_API_KEY
          urlTitle: View in Alertmanager
    - name: webhook
      webhookConfigs:
        - sendResolved: true
          urlSecret:
            name: alertmanager-webhook-secret
            key: WEBHOOK_URL
          httpConfig:
            authorization:
              type: Bearer
              credentials:
                name: alertmanager-webhook-secret
                key: WEBHOOK_TOKEN
