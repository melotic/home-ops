---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: fluent-bit
spec:
  interval: 1h
  url: https://fluent.github.io/helm-charts
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit
spec:
  chart:
    spec:
      chart: fluent-bit
      sourceRef:
        kind: HelmRepository
        name: fluent-bit
      version: 0.57.7
  interval: 1h
  values:
    env:
      - name: TZ
        value: America/Chicago
    extraPorts:
      - name: syslog-udp
        port: 5140
        containerPort: 5140
        protocol: UDP
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop: ["ALL"]
    extraVolumes:
      - name: tmp
        emptyDir: {}
    extraVolumeMounts:
      - name: tmp
        mountPath: /tmp
    config:
      service: |-
        [SERVICE]
            daemon            off
            flush             {{ .Values.flush }}
            log_level         {{ .Values.logLevel }}
            parsers_file      /fluent-bit/etc/parsers.conf
            parsers_file      /fluent-bit/etc/conf/custom_parsers.conf
            http_server       on
            http_listen       0.0.0.0
            http_port         {{ .Values.metricsPort }}
            health_check      on
      inputs: |
        [INPUT]
            Name              syslog
            Tag               syslog.*
            Mode              udp
            Listen            0.0.0.0
            Port              5140
            Parser            syslog-rfc3164-local
            Buffer_Chunk_Size 64000
      filters: ""
      customParsers: |-
        [PARSER]
            Name                 syslog-rfc3164-local
            Format               regex
            Regex                ^\<(?<pri>[0-9]{1,5})\>(?<time>[A-Za-z]{3}\s+[0-9]{1,2}\s+[0-9]{2}:[0-9]{2}:[0-9]{2})\s+(?<host>[^ ]+)\s+(?<ident>[^\[:{ ]+)(?:\[(?<pid>[0-9]+)\])?[: ]*(?<message>.*)$
            Time_Key             time
            Time_Format          %b %d %H:%M:%S
            Time_System_Timezone On
      outputs: |-
        [OUTPUT]
            Name                 http
            Match                syslog.*
            Host                 victoria-logs-server.monitoring.svc.cluster.local
            Port                 9428
            URI                  /insert/jsonline?_stream_fields=host,ident&_msg_field=message,log&_time_field=date
            Format               json_lines
            json_date_format     iso8601
            Compress             gzip
            Log_response_payload false
    dashboards:
      enabled: true
    serviceMonitor:
      enabled: true
    logLevel: warn
