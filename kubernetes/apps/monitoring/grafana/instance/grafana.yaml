---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      reporting_enabled: "false"
    auth:
      signout_redirect_url: "https://sso.melotic.dev/application/o/grafana/end-session/"
    auth.anonymous:
      enabled: "false"
    auth.generic_oauth:
      name: "authentik"
      enabled: "true"
      auto_login: "true"
      scopes: "openid profile email"
      auth_url: "https://sso.melotic.dev/application/o/authorize/"
      token_url: "https://sso.melotic.dev/application/o/token/"
      api_url: "https://sso.melotic.dev/application/o/userinfo/"
      role_attribute_path: "contains(groups[*], 'grafana-admins') && 'Admin' || contains(groups[*], 'grafana-editors') && 'Editor' || 'Viewer'"
    news:
      news_feed_enabled: "false"
    plugins:
      allow_loading_unsigned_plugins: "natel-discrete-panel,pr0ps-trackmap-panel,panodata-map-panel"
      plugin_admin_enabled: "false"
    security:
      angular_support_enabled: "true"
    server:
      enable_gzip: "true"
      root_url: "https://grafana.melotic.dev"
    users:
      auto_assign_org: "true"
      auto_assign_org_id: "1"
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        metadata:
          annotations:
            reloader.stakater.com/auto: "true"
        spec:
          containers:
            - name: grafana
              image: docker.io/grafana/grafana:13.0.2@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
              env:
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oauth-secret
                      key: client_id
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oauth-secret
                      key: client_secret
                - name: GF_INSTALL_PLUGINS
                  value: "grafana-clock-panel,grafana-piechart-panel,grafana-worldmap-panel,natel-discrete-panel,pr0ps-trackmap-panel,victoriametrics-logs-datasource,victoriametrics-metrics-datasource,vonage-status-panel"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 50m
                  memory: 512Mi
                limits:
                  memory: 1Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          volumes:
            - name: tmp
              emptyDir: {}
  disableDefaultSecurityContext: All
  httpRoute:
    spec:
      hostnames:
        - grafana.melotic.dev
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: https
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: ceph-block
