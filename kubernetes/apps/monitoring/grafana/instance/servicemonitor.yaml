---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: grafana
spec:
  selector:
    matchLabels:
      dashboards: grafana
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    - port: grafana
      interval: 1m
      path: /metrics
      honorLabels: true
  jobLabel: grafana
