---
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: &name ts-srv-zion
spec:
  replicas: 1
  hostnamePrefix: *name
  # Keep this router on its own tag so the ACL autoApprovers and deny tests can
  # target it without also matching the tag:k8s proxy pods. The operator only
  # applies tags at provisioning, so changing this means recreating the device.
  tags:
    - tag:zion-gw
  subnetRouter:
    # Individual /32s instead of 10.60.0.0/16 so a compromised pod can't scan
    # the subnet. Gateways get auto-approved; the resolver and Talos nodes are
    # approved by hand.
    advertiseRoutes:
      - 10.60.88.1/32
      - 10.60.80.1/32
      - 10.60.0.1/32
      - 10.60.85.10/32
      - 10.60.85.11/32
      - 10.60.85.12/32
