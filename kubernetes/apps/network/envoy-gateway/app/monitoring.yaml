---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-proxy
spec:
  jobLabel: envoy-proxy
  namespaceSelector:
    matchNames:
      - network
  podMetricsEndpoints:
    - port: metrics
      path: /stats/prometheus
      honorLabels: true
  selector:
    matchLabels:
      app.kubernetes.io/component: proxy
      app.kubernetes.io/name: envoy
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: envoy-gateway
spec:
  endpoints:
    - port: metrics
      path: /metrics
      honorLabels: true
  jobLabel: envoy-gateway
  namespaceSelector:
    matchNames:
      - network
  selector:
    matchLabels:
      control-plane: envoy-gateway
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: envoy-xds-health
spec:
  groups:
    - name: envoy-xds
      rules:
        - alert: EnvoyXdsConnectionFailures
          expr: |
            increase(envoy_cluster_upstream_cx_connect_fail{envoy_cluster_name="xds_cluster"}[10m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Envoy proxy {{ $labels.pod }} has xDS connection failures"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is failing to connect to the xDS control plane."
        - alert: EnvoyXdsDisconnected
          expr: |
            envoy_control_plane_connected_state{namespace="network"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Envoy proxy {{ $labels.pod }} disconnected from xDS control plane"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has not been connected to the envoy-gateway xDS control plane for 10m and cannot receive configuration updates."
        - alert: EnvoyXdsConfigRejected
          expr: |
            (sum(increase(envoy_cluster_manager_cds_update_rejected[1h])) or vector(0))
              + (sum(increase(envoy_listener_manager_lds_update_rejected[1h])) or vector(0))
              + (sum(increase(envoy_http_rds_update_rejected[1h])) or vector(0))
              + (sum(increase(envoy_sds_update_rejected[1h])) or vector(0)) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Envoy proxies rejected an xDS config update"
            description: "One or more Envoy proxies rejected a CDS/LDS/RDS/SDS update from the envoy-gateway control plane, indicating it is pushing invalid configuration."
