---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps/daemonset_v1.json
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: generic-device-plugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: generic-device-plugin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: generic-device-plugin
    spec:
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
          effect: NoExecute
        - operator: Exists
          effect: NoSchedule
      containers:
        - name: generic-device-plugin
          image: docker.io/squat/generic-device-plugin:0.2.0@sha256:bf312a67334be792d3a3d3042c99225aec469957dc1737911970aebbf82d1545
          args:
            - --domain=squat.ai
            - --device
            - |
              name: video
              groups:
                - paths:
                    - path: /dev/dri/renderD128
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 10Mi
            limits:
              cpu: 50m
              memory: 20Mi
          securityContext:
            privileged: true
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev
              mountPath: /dev
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: dev
          hostPath:
            path: /dev
  updateStrategy:
    type: RollingUpdate
