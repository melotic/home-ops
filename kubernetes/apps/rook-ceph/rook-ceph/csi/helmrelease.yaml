---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  releaseName: ceph-csi-drivers
  targetNamespace: rook-ceph
  storageNamespace: rook-ceph
  chart:
    spec:
      chart: ceph-csi-drivers
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
        namespace: rook-ceph
      version: 1.0.3
  interval: 1h
  values:
    operatorConfig:
      name: ceph-csi-operator-config
      namespace: rook-ceph
      create: true
      driverSpecDefaults:
        clusterName: rook-ceph
        imageSet:
          name: rook-csi-operator-image-set-configmap
        controllerPlugin:
          # Provisioner runs on the pod network; Ceph is reachable there (no dedicated
          # storage network). hostNetwork is only needed when the pod network cannot
          # reach the Ceph cluster. Keeping it false avoids tripping disallow-host-namespaces.
          hostNetwork: false
          replicas: 2
          deploymentStrategy:
            type: Recreate
          priorityClassName: system-cluster-critical
        nodePlugin:
          priorityClassName: system-node-critical
    drivers:
      rbd:
        name: rook-ceph.rbd.csi.ceph.com
        enabled: true
        clusterName: rook-ceph
        imageSet:
          name: rook-csi-operator-image-set-configmap
        # VolSync creates individual VolumeSnapshots per PVC on ceph-block; this
        # deploys the csi-snapshotter sidecar on the RBD controller plugin.
        snapshotPolicy: volumeSnapshot
        controllerPlugin:
          hostNetwork: false
          replicas: 2
          priorityClassName: system-cluster-critical
        nodePlugin:
          priorityClassName: system-node-critical
      cephfs:
        name: rook-ceph.cephfs.csi.ceph.com
        enabled: true
        clusterName: rook-ceph
        imageSet:
          name: rook-csi-operator-image-set-configmap
        snapshotPolicy: volumeGroupSnapshot
        kernelMountOptions:
          ms_mode: prefer-crc
        controllerPlugin:
          hostNetwork: false
          replicas: 2
          priorityClassName: system-cluster-critical
        nodePlugin:
          priorityClassName: system-node-critical
      nvmeof:
        enabled: false
      nfs:
        enabled: false
