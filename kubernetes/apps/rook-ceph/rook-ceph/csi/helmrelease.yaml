---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  releaseName: ceph-csi-drivers
  targetNamespace: rook-ceph
  storageNamespace: rook-ceph
  chart:
    spec:
      chart: ceph-csi-drivers
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
        namespace: rook-ceph
      version: 1.0.1
  interval: 1h
  values:
    operatorConfig:
      name: ceph-csi-operator-config
      namespace: rook-ceph
      create: true
      driverSpecDefaults:
        clusterName: rook-ceph
        imageSet:
          name: rook-csi-operator-image-set-configmap
        controllerPlugin:
          hostNetwork: true
          replicas: 2
          deploymentStrategy:
            type: Recreate
          priorityClassName: system-cluster-critical
        nodePlugin:
          priorityClassName: system-node-critical
    drivers:
      rbd:
        name: rook-ceph.rbd.csi.ceph.com
        enabled: true
        clusterName: rook-ceph
        imageSet:
          name: rook-csi-operator-image-set-configmap
        snapshotPolicy: none
        controllerPlugin:
          hostNetwork: true
          replicas: 2
          priorityClassName: system-cluster-critical
          resources:
            attacher:
              requests: { cpu: 100m, memory: 128Mi }
              limits: { memory: 256Mi }
            provisioner:
              requests: { cpu: 100m, memory: 128Mi }
              limits: { memory: 256Mi }
            resizer:
              requests: { cpu: 100m, memory: 128Mi }
              limits: { memory: 256Mi }
            snapshotter:
              requests: { cpu: 100m, memory: 128Mi }
              limits: { memory: 256Mi }
            omapGenerator:
              requests: { cpu: 250m, memory: 512Mi }
              limits: { memory: 1Gi }
            plugin:
              requests: { memory: 512Mi }
              limits: { memory: 1Gi }
        nodePlugin:
          priorityClassName: system-node-critical
          resources:
            plugin:
              requests: { cpu: 250m, memory: 512Mi }
              limits: { memory: 1Gi }
            registrar:
              requests: { cpu: 50m, memory: 128Mi }
              limits: { memory: 256Mi }
      cephfs:
        name: rook-ceph.cephfs.csi.ceph.com
        enabled: true
        clusterName: rook-ceph
        imageSet:
          name: rook-csi-operator-image-set-configmap
        snapshotPolicy: volumeGroupSnapshot
        kernelMountOptions:
          ms_mode: prefer-crc
        controllerPlugin:
          hostNetwork: true
          replicas: 2
          priorityClassName: system-cluster-critical
          resources:
            attacher:
              requests: { cpu: 100m, memory: 128Mi }
              limits: { memory: 256Mi }
            provisioner:
              requests: { cpu: 100m, memory: 128Mi }
              limits: { memory: 256Mi }
            resizer:
              requests: { cpu: 100m, memory: 128Mi }
              limits: { memory: 256Mi }
            snapshotter:
              requests: { cpu: 100m, memory: 128Mi }
              limits: { memory: 256Mi }
            plugin:
              requests: { cpu: 250m, memory: 512Mi }
              limits: { memory: 1Gi }
        nodePlugin:
          priorityClassName: system-node-critical
          resources:
            plugin:
              requests: { cpu: 250m, memory: 512Mi }
              limits: { memory: 1Gi }
            registrar:
              requests: { cpu: 50m, memory: 128Mi }
              limits: { memory: 256Mi }
      nvmeof:
        enabled: false
      nfs:
        enabled: false
