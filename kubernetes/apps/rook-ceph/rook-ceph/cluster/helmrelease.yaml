---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  interval: 1h
  timeout: 30m
  values:
    cephImage:
      repository: quay.io/ceph/ceph
      tag: v19.2.3-20250717@sha256:af0c5903e901e329adabe219dfc8d0c3efc1f05102a753902f33ee16c26b6cee
      allowUnsupported: false
    cephClusterSpec:
      # Daemons already log to stdout (collected by victoria-logs); the file-based
      # log collector + logrotate sidecars only duplicate that to disk.
      logCollector:
        enabled: false
      cephConfig:
        global:
          osd_pool_default_min_size: "2"
          osd_pool_default_size: "3"
        mon:
          mon_data_avail_warn: "20"
      # Override chart defaults that over-reserve small-cluster Ceph daemons.
      resources:
        mon:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 2Gi
        mgr:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi
        osd:
          requests:
            cpu: 250m
            memory: 4Gi
          limits:
            memory: 4Gi
      cleanupPolicy:
        wipeDevicesFromOtherClusters: false
      crashCollector:
        disable: false
      csi:
        readAffinity:
          enabled: false
      dashboard:
        enabled: true
        prometheusEndpoint: http://prometheus-operated.monitoring.svc.cluster.local:9090
        ssl: false
        urlPrefix: /
      mgr:
        modules:
          - name: pg_autoscaler
            enabled: true
      network:
        connections:
          requireMsgr2: true
      storage:
        useAllDevices: false
        useAllNodes: false
        nodes:
          - name: k8s-niobe
            devices:
              - name: /dev/disk/by-partlabel/r-rook-osd
          - name: k8s-trinity
            devices:
              - name: /dev/disk/by-partlabel/r-rook-osd
          - name: k8s-ghost
            devices:
              - name: /dev/disk/by-partlabel/r-rook-osd
    monitoring:
      enabled: true
      createPrometheusRules: true
      prometheusRuleOverrides:
        # Gate the 5d projection on current fill (<25% free): /var on k8s-ghost
        # sawtooths to ~30% free during nightly backups, so the ungated predictor
        # false-fires. Mirrors upstream NodeFilesystemSpaceFillingUp's current-fill gate.
        CephNodeDiskspaceWarning:
          expr: |-
            (
              predict_linear(
                max without (pod) (node_filesystem_free_bytes{device=~"/.*"})[2d:5m],
                3600 * 24 * 5
              ) * on(cluster, instance) group_left(nodename) node_uname_info < 0
            )
            and on(instance, device, mountpoint)
            (
              node_filesystem_avail_bytes{device=~"/.*"}
                / node_filesystem_size_bytes{device=~"/.*"} * 100 < 25
            )
        CephPoolGrowthWarning:
          expr: |-
            (
              predict_linear(
                max without (pod, instance) (ceph_pool_percent_used)[2d:5m],
                3600 * 24 * 5
              )
              * on(cluster, pool_id) group_right()
              max without (pod, instance) (ceph_pool_metadata)
            ) >= 95
    toolbox:
      enabled: true
    route:
      dashboard:
        host:
          name: rook.melotic.dev
          path: /
          pathType: PathPrefix
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          parameters:
            min_size: "2"
          replicated:
            size: 3
        storageClass:
          enabled: true
          name: ceph-block
          allowVolumeExpansion: true
          isDefault: true
          mountOptions:
            - discard
          parameters:
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            imageFeatures: deep-flatten,exclusive-lock,fast-diff,layering,object-map
            imageFormat: "2"
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool
      deletionPolicy: Delete
      isDefault: true
    cephFileSystems:
      - name: ceph-filesystem
        spec:
          metadataPool:
            parameters:
              min_size: "2"
            replicated:
              size: 3
          dataPools:
            - name: data0
              failureDomain: host
              parameters:
                min_size: "2"
              replicated:
                size: 3
          metadataServer:
            activeCount: 1
            activeStandby: true
            placement:
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: ceph-mds
                      app.kubernetes.io/part-of: ceph-filesystem
            priorityClassName: system-cluster-critical
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 2Gi
        storageClass:
          enabled: true
          name: ceph-filesystem
          allowVolumeExpansion: true
          isDefault: false
          parameters:
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
          pool: data0
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
    cephFileSystemVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-filesystem
      deletionPolicy: Delete
      isDefault: false
    cephObjectStores:
      - name: gitlab-rgw
        spec:
          allowUsersInNamespaces:
            - gitlab
          metadataPool:
            failureDomain: host
            parameters:
              min_size: "2"
            replicated:
              size: 3
          dataPool:
            failureDomain: host
            parameters:
              min_size: "2"
            replicated:
              size: 3
          preservePoolsOnDelete: true
          gateway:
            port: 80
            instances: 1
            priorityClassName: system-cluster-critical
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi
        storageClass:
          enabled: true
          name: gitlab-rgw-bucket
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
          parameters:
            region: us-east-1
