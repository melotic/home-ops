---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: multi-scrobbler
spec:
  chartRef:
    kind: OCIRepository
    name: multi-scrobbler
  interval: 1h
  values:
    controllers:
      multi-scrobbler:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          fix-run:
            image:
              repository: busybox
              tag: latest
            command: ["sh", "-c", "chown 1000:1000 /run"]
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
        containers:
          app:
            image:
              repository: ghcr.io/foxxmd/multi-scrobbler
              tag: 0.12.0
            env:
              TZ: Etc/UTC
              CONFIG_DIR: /config
              BASE_URL: "http://localhost:9078"
            envFrom:
              - secretRef:
                  name: multi-scrobbler-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 9078
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        forceRename: "{{ .Release.Name }}"
        ports:
          http:
            port: *port
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /config
      config-file:
        type: configMap
        name: multi-scrobbler-config
        globalMounts:
          - path: /config/config.json
            subPath: config.json
            readOnly: true
      run:
        type: emptyDir
        globalMounts:
          - path: /run
      tmp:
        type: emptyDir
