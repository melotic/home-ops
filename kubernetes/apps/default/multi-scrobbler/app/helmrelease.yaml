---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: multi-scrobbler
spec:
  chartRef:
    kind: OCIRepository
    name: multi-scrobbler
  interval: 1h
  values:
    controllers:
      multi-scrobbler:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/foxxmd/multi-scrobbler
              tag: 0.13.1
            command: ["/usr/bin/node"]
            args: ["/app/node_modules/.bin/tsx", "src/backend/index.ts"]
            env:
              BASE_URL: https://scrobbler.melotic.dev
              IS_DOCKER: "true"
              LASTFM_REDIRECT_URI: https://scrobbler.melotic.dev/lastfm/callback
              MB_PRESETS: default,sensible,native
              NODE_ENV: production
              PLEX_TRANSFORMS: musicbrainz
              PLEX_URL: "http://plex.default.svc.cluster.local:32400"
              TZ: Etc/UTC
            envFrom:
              - secretRef:
                  name: multi-scrobbler-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 9078
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        forceRename: "{{ .Release.Name }}"
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - scrobbler.melotic.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      config:
        existingClaim: multi-scrobbler
        globalMounts:
          - path: /config
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
