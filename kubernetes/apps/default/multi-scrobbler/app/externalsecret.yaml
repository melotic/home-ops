---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: multi-scrobbler
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: multi-scrobbler-secret
    template:
      data:
        PLEX_TOKEN: "{{ .PLEX_TOKEN }}"
        LZ_TOKEN: "{{ .LZ_TOKEN }}"
        LZ_USER: "{{ .LZ_USER }}"
        LASTFM_API_KEY: "{{ .LASTFM_API_KEY }}"
        LASTFM_SECRET: "{{ .LASTFM_SECRET }}"
  dataFrom:
    - extract:
        key: multi-scrobbler
