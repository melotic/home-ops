---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forejo
spec:
  chartRef:
    kind: OCIRepository
    name: forejo
  interval: 1h
  values:
    service:
      ssh:
        type: LoadBalancer
        port: 22
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv4
          - IPv6
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "ssh.git.melotic.dev"

    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: https
      hostnames:
        - "git.melotic.dev"
      matches:
        path:
          type: PathPrefix
          value: /

    persistence:
      enabled: true
      existingClaim: forejo

    deployment:
      env:
        - name: GITEA__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: postgres-cluster-app
              key: password

    gitea:
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      livenessProbe:
        enabled: true
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 10
      readinessProbe:
        enabled: true
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3
      startupProbe:
        enabled: true
        initialDelaySeconds: 10
        periodSeconds: 5
        failureThreshold: 30
      oauth:
        - name: authentik
          provider: openidConnect
          existingSecret: forejo-oidc
          autoDiscoverUrl: "https://sso.melotic.dev/application/o/forejo/.well-known/openid-configuration"
          iconUrl: "https://sso.melotic.dev/static/dist/assets/icons/icon.png"
          scopes: "email profile"
          adminGroup: forejo-admins
          groupClaimName: groups
      config:
        APP_NAME: Forejo
        RUN_MODE: prod
        cache:
          ADAPTER: redis
          HOST: redis://dragonfly.database.svc.cluster.local:6379/5?pool_size=100&idle_timeout=180s
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis://dragonfly.database.svc.cluster.local:6379/6?pool_size=100&idle_timeout=180s
          SESSION_LIFE: 86400
        queue:
          TYPE: redis
          CONN_STR: redis://dragonfly.database.svc.cluster.local:6379/7?pool_size=100&idle_timeout=180s
        server:
          DOMAIN: "git.melotic.dev"
          ROOT_URL: "https://git.melotic.dev/"
          SSH_DOMAIN: "ssh.git.melotic.dev"
          SSH_PORT: 22
          SSH_LISTEN_PORT: 2222
        database:
          DB_TYPE: postgres
          HOST: postgres-cluster-rw.database.svc.cluster.local:5432
          NAME: forejo
          USER: app
          SSL_MODE: disable
        picture:
          DISABLE_GRAVATAR: false
        mailer:
          ENABLED: true
          PROTOCOL: smtp
          SMTP_ADDR: smtp-relay.default.svc.cluster.local
          SMTP_PORT: "587"
          FROM: "Forgejo <noreply@melotic.dev>"
        service:
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          DISABLE_REGISTRATION: true
          REQUIRE_SIGNIN_VIEW: true
          ENABLE_NOTIFY_MAIL: true
          ENABLE_OAUTH2_AUTO_REGISTER: true
          REGISTER_EMAIL_CONFIRM: false
        metrics:
          ENABLED: true
        webhook:
          ALLOWED_HOST_LIST: 10.20.0.0/16,10.42.0.0/16,10.60.0.0/16,discord.com

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
