---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: beets
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 988
          initContainers:
            - name: copy-config
              image: busybox:1.37.0
              command:
                - sh
                - -c
                - cp /config-source/config.yaml /config/config.yaml
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: config-source
                  mountPath: /config-source
                  readOnly: true
                - name: config-dir
                  mountPath: /config
          containers:
            - name: beets
              image: lscr.io/linuxserver/beets:2.7.1
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  export PATH="/lsiopy/bin:$PATH"
                  mkdir -p /data/media/beets
                  echo "[$(date)] Starting beets incremental import..."
                  beet -c /config/config.yaml import -q /data/media/music
                  echo "[$(date)] Beets import complete."
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: config-dir
                  mountPath: /config
                - name: nfs-data
                  mountPath: /data
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: config-source
              configMap:
                name: beets-config
            - name: config-dir
              emptyDir: {}
            - name: nfs-data
              nfs:
                server: construct.melotic.dev
                path: /var/nfs/shared/data
            - name: tmp
              emptyDir: {}
