---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: beets
spec:
  chartRef:
    kind: OCIRepository
    name: beets
  interval: 1h
  values:
    controllers:
      beets:
        type: cronjob
        cronjob:
          schedule: "0 */6 * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
          backoffLimit: 1
          activeDeadlineSeconds: 10800
          ttlSecondsAfterFinished: 86400
        pod:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 988
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/beets
              tag: 2.8.0
            command:
              - /bin/bash
              - -c
              - |
                set -e
                export PATH="/lsiopy/bin:$PATH"
                echo "[$(date)] Starting beets incremental import..."
                beet -c /config/config.yaml import -q /data/media/music
                echo "[$(date)] Beets import complete."
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    persistence:
      config:
        existingClaim: beets
        globalMounts:
          - path: /config
      config-source:
        type: configMap
        name: beets-config
        globalMounts:
          - path: /config/config.yaml
            subPath: config.yaml
            readOnly: true
      data:
        type: nfs
        server: construct.melotic.dev
        path: /var/nfs/shared/data
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
