---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: harbor
    template:
      data:
        HARBOR_ADMIN_PASSWORD: "{{ .HARBOR_ADMIN_PASSWORD }}"
        secretKey: "{{ .secretKey }}"
  dataFrom:
    - extract:
        key: harbor
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-oidc
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: harbor-oidc-config
    template:
      data:
        CONFIG_OVERWRITE_JSON: |
          {
            "auth_mode": "oidc_auth",
            "oidc_name": "authentik",
            "oidc_endpoint": "https://sso.${SECRET_DOMAIN}/application/o/harbor/",
            "oidc_client_id": "{{ .authentik_harbor_client_id }}",
            "oidc_client_secret": "{{ .authentik_harbor_client_secret }}",
            "oidc_scope": "openid,profile,email,offline_access",
            "oidc_groups_claim": "groups",
            "oidc_admin_group": "harbor-admins",
            "oidc_verify_cert": true,
            "oidc_auto_onboard": true,
            "oidc_user_claim": "preferred_username"
          }
  dataFrom:
    - extract:
        key: authentik-oidc
      rewrite:
        - regexp:
            source: "(.*)"
            target: "authentik_$1"
