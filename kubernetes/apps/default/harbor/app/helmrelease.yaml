---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: harbor
spec:
  url: https://helm.goharbor.io
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
spec:
  interval: 1h
  chart:
    spec:
      chart: harbor
      sourceRef:
        kind: HelmRepository
        name: harbor
      version: 1.18.3
  install:
    remediation:
      retries: -1
  values:
    priorityClassName: app-high
    updateStrategy:
      type: Recreate
    expose:
      type: route
      tls:
        enabled: false
      route:
        hosts:
          - "harbor.melotic.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    externalURL: "https://harbor.melotic.dev"
    persistence:
      enabled: true
      persistentVolumeClaim:
        registry:
          storageClass: nfs-construct
        trivy:
          size: 10Gi
    existingSecretAdminPassword: harbor
    existingSecretSecretKey: harbor
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    redis:
      type: external
      external:
        addr: "dragonfly.database.svc.cluster.local:6379"
        coreDatabaseIndex: "1"
        jobserviceDatabaseIndex: "2"
        registryDatabaseIndex: "3"
        trivyAdapterIndex: "4"
    database:
      type: external
      external:
        host: postgres-cluster-rw.database.svc.cluster.local
        username: app
        coreDatabase: harbor
        existingSecret: postgres-cluster-app
    core:
      image:
        repository: docker.io/goharbor/harbor-core
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
      extraEnvVars:
        - name: CONFIG_OVERWRITE_JSON
          valueFrom:
            secretKeyRef:
              name: harbor-oidc-config
              key: CONFIG_OVERWRITE_JSON
    registry:
      registry:
        image:
          repository: docker.io/goharbor/registry-photon
      controller:
        image:
          repository: docker.io/goharbor/harbor-registryctl
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
    jobservice:
      image:
        repository: docker.io/goharbor/harbor-jobservice
      resources:
        requests:
          cpu: 30m
          memory: 128Mi
        limits:
          memory: 256Mi
    trivy:
      image:
        repository: docker.io/goharbor/trivy-adapter-photon
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
    portal:
      image:
        repository: docker.io/goharbor/harbor-portal
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
    exporter:
      image:
        repository: docker.io/goharbor/harbor-exporter
