---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: harbor
spec:
  url: https://helm.goharbor.io
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
spec:
  interval: 1h
  chart:
    spec:
      chart: harbor
      sourceRef:
        kind: HelmRepository
        name: harbor
      version: 1.19.1
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    updateStrategy:
      type: Recreate
    expose:
      type: route
      tls:
        enabled: false
      route:
        hosts:
          - "harbor.melotic.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    externalURL: "https://harbor.melotic.dev"
    persistence:
      enabled: true
      persistentVolumeClaim:
        registry:
          existingClaim: harbor
        jobservice:
          jobLog:
            storageClass: ceph-block
        trivy:
          storageClass: ceph-block
          size: 16Gi
    existingSecretAdminPassword: harbor
    existingSecretSecretKey: harbor
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    redis:
      type: external
      external:
        addr: "dragonfly.database.svc.cluster.local:6379"
        coreDatabaseIndex: "1"
        jobserviceDatabaseIndex: "2"
        registryDatabaseIndex: "3"
        trivyAdapterIndex: "4"
    database:
      type: external
      external:
        host: ${PG_HOST:=postgres-cluster-rw.database.svc.cluster.local}
        username: harbor
        coreDatabase: harbor
        existingSecret: harbor-postgres
    core:
      priorityClassName: app-high
      image:
        repository: docker.io/goharbor/harbor-core
      resources:
        requests:
          cpu: 10m
          memory: 256Mi
        limits:
          memory: 256Mi
      extraEnvVars:
        - name: CONFIG_OVERWRITE_JSON
          valueFrom:
            secretKeyRef:
              name: harbor-oidc-config
              key: CONFIG_OVERWRITE_JSON
    registry:
      priorityClassName: app-high
      registry:
        image:
          repository: docker.io/goharbor/registry-photon
        resources:
          requests:
            cpu: 10m
            memory: 256Mi
          limits:
            memory: 256Mi
      controller:
        image:
          repository: docker.io/goharbor/harbor-registryctl
        resources:
          requests:
            cpu: 10m
            memory: 256Mi
          limits:
            memory: 256Mi
    jobservice:
      priorityClassName: app-high
      image:
        repository: docker.io/goharbor/harbor-jobservice
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 256Mi
    trivy:
      priorityClassName: app-high
      image:
        repository: docker.io/goharbor/trivy-adapter-photon
      resources:
        requests:
          cpu: 10m
          memory: 256Mi
        limits:
          cpu: null
          memory: 384Mi
    portal:
      priorityClassName: app-high
      image:
        repository: docker.io/goharbor/harbor-portal
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
    exporter:
      priorityClassName: app-high
      image:
        repository: docker.io/goharbor/harbor-exporter
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
