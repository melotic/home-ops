---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secret
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: authentik-secret
    template:
      data:
        AUTHENTIK_SECRET_KEY: "{{ .authentik_secret_key }}"
        GRAFANA_CLIENT_ID: "{{ .grafana_client_id }}"
        GRAFANA_CLIENT_SECRET: "{{ .grafana_client_secret }}"
        FOREJO_CLIENT_ID: "{{ .forejo_client_id }}"
        FOREJO_CLIENT_SECRET: "{{ .forejo_client_secret }}"
        HARBOR_CLIENT_ID: "{{ .harbor_client_id }}"
        HARBOR_CLIENT_SECRET: "{{ .harbor_client_secret }}"
        PAPERLESS_CLIENT_ID: "{{ .paperless_client_id }}"
        PAPERLESS_CLIENT_SECRET: "{{ .paperless_client_secret }}"
  dataFrom:
    - extract:
        key: authentik-oidc
