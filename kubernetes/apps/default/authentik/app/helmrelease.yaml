---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  chartRef:
    kind: OCIRepository
    name: authentik
  interval: 1h
  values:
    authentik:
      email:
        from: noreply@melotic.dev
        host: smtp-relay.default.svc.cluster.local
        port: 587
        use_ssl: false
        use_tls: false
      error_reporting:
        enabled: false
      postgresql:
        host: postgres-cluster-rw.database.svc.cluster.local
        password: file:///postgres-creds/password
        user: file:///postgres-creds/username
    blueprints:
      configMaps:
        - authentik-blueprints
    geoip:
      enabled: true
      existingSecret:
        accountId: MAXMIND_ACCOUNT_ID
        licenseKey: MAXMIND_LICENSE_KEY
        secretName: authentik-secret
    prometheus:
      rules:
        enabled: true
    server:
      envFrom:
        - secretRef:
            name: authentik-secret
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      podAnnotations:
        reloader.stakater.com/auto: "true"
      route:
        main:
          enabled: true
          hostnames:
            - sso.melotic.dev
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https
      volumeMounts: &volumeMounts
        - mountPath: /postgres-creds
          name: postgres-creds
          readOnly: true
        - mountPath: /data
          name: data
      volumes: &volumes
        - name: postgres-creds
          secret:
            secretName: postgres-cluster-app
        - name: data
          persistentVolumeClaim:
            claimName: authentik-data
    worker:
      envFrom:
        - secretRef:
            name: authentik-secret
      podAnnotations:
        reloader.stakater.com/auto: "true"
      volumeMounts: *volumeMounts
      volumes: *volumes
