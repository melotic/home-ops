---
# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: GitLab OAuth2 Provider and Application
context:
  authorization_flow:
    !Find &authorization_flow [
      authentik_flows.flow,
      [slug, default-provider-authorization-implicit-consent],
    ]
  invalidation_flow:
    !Find &invalidation_flow [
      authentik_flows.flow,
      [slug, default-provider-invalidation-flow],
    ]
  property_mappings: &property_mappings
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  groups_scope_mapping: &groups_scope_mapping
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
    - !KeyOf gitlab-groups-scope
  signing_key:
    !Find &signing_key [
      authentik_crypto.certificatekeypair,
      [name, authentik Self-signed Certificate],
    ]
entries:
  # Custom scope mapping to emit groups claim
  - model: authentik_providers_oauth2.scopemapping
    id: gitlab-groups-scope
    identifiers:
      name: gitlab-groups
    attrs:
      name: gitlab-groups
      scope_name: groups
      expression: |
        return {
          "groups": [group.name for group in user.ak_groups.all()]
        }

  # GitLab administrators group
  - model: authentik_core.group
    id: gitlab-admins-group
    identifiers:
      name: gitlab-admins
    attrs:
      name: gitlab-admins

  # OAuth2 Provider for GitLab
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: gitlab
    attrs:
      name: gitlab
      authorization_flow: *authorization_flow
      invalidation_flow: *invalidation_flow
      client_type: confidential
      client_id: !Env GITLAB_CLIENT_ID
      client_secret: !Env GITLAB_CLIENT_SECRET
      redirect_uris:
        - url: "https://gitlab.melotic.dev/users/auth/openid_connect/callback"
          matching_mode: strict
      property_mappings: *groups_scope_mapping
      signing_key: *signing_key

  # Application for GitLab
  - model: authentik_core.application
    identifiers:
      slug: gitlab
    attrs:
      name: GitLab
      slug: gitlab
      provider:
        !Find [authentik_providers_oauth2.oauth2provider, [name, gitlab]]
      policy_engine_mode: any
      meta_icon: https://about.gitlab.com/images/press/logo/svg/gitlab-icon-rgb.svg
      meta_description: Self-hosted GitLab (internal)
      meta_publisher: GitLab
      open_in_new_tab: true
