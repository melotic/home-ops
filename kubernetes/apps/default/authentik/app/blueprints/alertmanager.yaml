---
version: 1
metadata:
  name: Alertmanager Proxy Provider and Application
context:
  authorization_flow: &authorization_flow !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
  invalidation_flow: &invalidation_flow !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
entries:
  - model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: alertmanager
    attrs:
      name: alertmanager
      authorization_flow: *authorization_flow
      invalidation_flow: *invalidation_flow
      mode: forward_single
      external_host: https://alertmanager.melotic.dev
  - model: authentik_core.application
    identifiers:
      slug: alertmanager
    attrs:
      name: Alertmanager
      slug: alertmanager
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, alertmanager]]
      policy_engine_mode: any
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/alertmanager.svg
      meta_description: Alert routing and management
      open_in_new_tab: true
