---
version: 1
metadata:
  name: Home Assistant Proxy Provider and Application
entries:
  - model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: home-assistant
    attrs:
      name: home-assistant
      mode: forward_single
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      external_host: https://home-assistant.melotic.dev
      access_token_validity: hours=24

  - model: authentik_core.application
    identifiers:
      slug: home-assistant
    attrs:
      name: Home Assistant
      slug: home-assistant
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, home-assistant]]
      policy_engine_mode: any
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/home-assistant.svg
      meta_description: Home automation
      open_in_new_tab: true
