---
version: 1
metadata:
  name: Home Assistant Proxy Provider and Application
context:
  authorization_flow: &authorization_flow !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
  invalidation_flow: &invalidation_flow !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
entries:
  - model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: home-assistant
    attrs:
      name: home-assistant
      authorization_flow: *authorization_flow
      invalidation_flow: *invalidation_flow
      mode: forward_single
      external_host: https://hass.melotic.dev
      skip_path_regex: |
        ^/api/.*
        ^/auth/token
        ^/local/.*
  - model: authentik_core.application
    identifiers:
      slug: home-assistant
    attrs:
      name: Home Assistant
      slug: home-assistant
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, home-assistant]]
      policy_engine_mode: any
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/home-assistant.svg
      meta_description: Home automation
      open_in_new_tab: true
