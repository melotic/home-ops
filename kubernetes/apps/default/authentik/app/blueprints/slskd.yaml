---
version: 1
metadata:
  name: slskd Proxy Provider and Application
context:
  authorization_flow: &authorization_flow !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
  invalidation_flow: &invalidation_flow !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
entries:
  - model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: slskd
    attrs:
      name: slskd
      authorization_flow: *authorization_flow
      invalidation_flow: *invalidation_flow
      mode: forward_single
      external_host: https://slskd.melotic.dev
  - model: authentik_core.application
    identifiers:
      slug: slskd
    attrs:
      name: slskd
      slug: slskd
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, slskd]]
      policy_engine_mode: any
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/slskd.svg
      meta_description: Soulseek client
      open_in_new_tab: true
