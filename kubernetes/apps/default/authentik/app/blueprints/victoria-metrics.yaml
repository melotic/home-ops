---
version: 1
metadata:
  name: VictoriaMetrics Proxy Provider and Application
context:
  authorization_flow: &authorization_flow !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
  invalidation_flow: &invalidation_flow !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
entries:
  - model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: victoria-metrics
    attrs:
      name: victoria-metrics
      authorization_flow: *authorization_flow
      invalidation_flow: *invalidation_flow
      mode: forward_single
      external_host: https://vm.melotic.dev
  - model: authentik_core.application
    identifiers:
      slug: victoria-metrics
    attrs:
      name: VictoriaMetrics
      slug: victoria-metrics
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, victoria-metrics]]
      policy_engine_mode: any
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/victoriametrics.svg
      meta_description: Time series database and monitoring
      open_in_new_tab: true
