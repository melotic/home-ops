# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: melotic Authentication Flow
  labels:
    blueprints.goauthentik.io/description: "Custom authentication flow with MFA enforcement"
entries:
  # Ensure default MFA setup flows exist (shipped with Authentik)
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - TOTP MFA setup flow
      required: false
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - WebAuthn MFA setup flow
      required: false
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Static MFA setup flow
      required: false
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Password change flow
      required: false

  # --- Flow ---
  - model: authentik_flows.flow
    id: flow
    identifiers:
      slug: melotic-authentication-flow
    attrs:
      name: Sign in
      title: Sign in to melotic
      designation: authentication
      authentication: none

  # --- Stages ---

  # Identification: accept email or username
  - model: authentik_stages_identification.identificationstage
    id: identification
    identifiers:
      name: melotic-identification
    attrs:
      user_fields:
        - email
        - username
      show_matched_user: true
      show_source_labels: true

  # Password verification
  - model: authentik_stages_password.passwordstage
    id: password
    identifiers:
      name: melotic-password
    attrs:
      backends:
        - authentik.core.auth.InbuiltBackend
        - authentik.core.auth.TokenBackend
      configure_flow: !Find [authentik_flows.flow, [slug, default-password-change]]

  # MFA validation — enforced, not optional
  # not_configured_action: configure forces MFA setup on first login
  - model: authentik_stages_authenticator_validate.authenticatorvalidatestage
    id: mfa
    identifiers:
      name: melotic-mfa-validation
    attrs:
      not_configured_action: configure
      device_classes:
        - totp
        - webauthn
        - static
      configuration_stages:
        - !Find [authentik_stages_authenticator_totp.authenticatortotpstage, [name, default-authenticator-totp-setup]]
        - !Find [authentik_stages_authenticator_webauthn.authenticatorwebauthnstage, [name, default-authenticator-webauthn-setup]]
        - !Find [authentik_stages_authenticator_static.authenticatorstaticstage, [name, default-authenticator-static-setup]]

  # Login: create the session
  - model: authentik_stages_user_login.userloginstage
    id: login
    identifiers:
      name: melotic-login

  # --- Stage Bindings ---

  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf flow
      stage: !KeyOf identification
      order: 10

  - model: authentik_flows.flowstagebinding
    id: password-binding
    identifiers:
      target: !KeyOf flow
      stage: !KeyOf password
      order: 20
    attrs:
      re_evaluate_policies: true

  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf flow
      stage: !KeyOf mfa
      order: 30

  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf flow
      stage: !KeyOf login
      order: 100

  # --- Policies ---

  # Skip password stage if already authenticated (e.g. via passwordless WebAuthn)
  - model: authentik_policies_expression.expressionpolicy
    id: password-optional-policy
    identifiers:
      name: melotic-password-stage-optional
    attrs:
      expression: |
        flow_plan = request.context.get("flow_plan")
        if not flow_plan:
            return True
        return not hasattr(flow_plan.context.get("pending_user"), "backend")

  - model: authentik_policies.policybinding
    identifiers:
      order: 10
      target: !KeyOf password-binding
      policy: !KeyOf password-optional-policy
    attrs:
      failure_result: true
