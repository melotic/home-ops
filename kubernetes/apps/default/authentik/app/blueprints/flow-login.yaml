---
# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: melotic Authentication Flow
  labels:
    blueprints.goauthentik.io/description: "Custom authentication flow with MFA enforcement, Cloudflare Turnstile, and GeoIP restriction"
entries:
  # Ensure default MFA setup flows exist (shipped with Authentik)
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - TOTP MFA setup flow
      required: false
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - WebAuthn MFA setup flow
      required: false
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Static MFA setup flow
      required: false
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Password change flow
      required: false

  # --- Flow ---
  - model: authentik_flows.flow
    id: flow
    identifiers:
      slug: melotic-authentication-flow
    attrs:
      name: Sign in
      title: Sign in to zion
      designation: authentication
      authentication: none

  # --- Stages ---

  # Password verification
  - model: authentik_stages_password.passwordstage
    id: password
    identifiers:
      name: melotic-password
    attrs:
      backends:
        - authentik.core.auth.InbuiltBackend
        - authentik.core.auth.TokenBackend
      configure_flow:
        !Find [authentik_flows.flow, [slug, default-password-change]]

  # Cloudflare Turnstile CAPTCHA (Invisible mode)
  # Set AUTHENTIK_TURNSTILE_SITE_KEY and AUTHENTIK_TURNSTILE_SECRET_KEY in your env
  - model: authentik_stages_captcha.captchastage
    id: captcha
    identifiers:
      name: melotic-captcha-turnstile
    attrs:
      public_key: !Env TURNSTILE_SITE_KEY
      private_key: !Env TURNSTILE_SECRET_KEY
      js_url: https://challenges.cloudflare.com/turnstile/v0/api.js
      api_url: https://challenges.cloudflare.com/turnstile/v0/siteverify
      interactive: true

  # Identification: single-page login with inline password + Turnstile
  # password_stage and captcha_stage are inline — they must NOT also be bound to the flow
  - model: authentik_stages_identification.identificationstage
    id: identification
    identifiers:
      name: melotic-identification
    attrs:
      password_stage: !KeyOf password
      captcha_stage: !KeyOf captcha
      user_fields:
        - email
        - username
      show_matched_user: true
      show_source_labels: true

  # MFA validation — enforced, not optional
  # not_configured_action: configure forces MFA setup on first login
  - model: authentik_stages_authenticator_validate.authenticatorvalidatestage
    id: mfa
    identifiers:
      name: melotic-mfa-validation
    attrs:
      not_configured_action: configure
      device_classes:
        - totp
        - webauthn
        - static
      configuration_stages:
        - !Find [
            authentik_stages_authenticator_totp.authenticatortotpstage,
            [name, default-authenticator-totp-setup],
          ]
        - !Find [
            authentik_stages_authenticator_webauthn.authenticatorwebauthnstage,
            [name, default-authenticator-webauthn-setup],
          ]
        - !Find [
            authentik_stages_authenticator_static.authenticatorstaticstage,
            [name, default-authenticator-static-setup],
          ]

  # Login: create the session
  - model: authentik_stages_user_login.userloginstage
    id: login
    identifiers:
      name: melotic-login

  # --- Stage Bindings ---

  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf flow
      stage: !KeyOf identification
      order: 10

  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf flow
      stage: !KeyOf mfa
      order: 30

  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf flow
      stage: !KeyOf login
      order: 100

  # --- Policies ---

  # GeoIP: restrict logins to allowed countries + impossible travel detection
  - model: authentik_policies_geoip.geoippolicy
    id: geoip-policy
    identifiers:
      name: melotic-geoip-restriction
    attrs:
      countries:
        - US
      check_impossible_travel: true
      impossible_tolerance_km: 100
      check_history_distance: false

  # Expression wrapper: skip GeoIP for private/RFC1918 IPs (which have no
  # MaxMind record) and delegate to the GeoIP policy for public IPs.
  - model: authentik_policies_expression.expressionpolicy
    id: geoip-wrapper
    identifiers:
      name: melotic-geoip-private-bypass
    attrs:
      expression: |
        import ipaddress

        PRIVATE_NETWORKS = [
            ipaddress.ip_network("10.0.0.0/8"),
            ipaddress.ip_network("172.16.0.0/12"),
            ipaddress.ip_network("192.168.0.0/16"),
            ipaddress.ip_network("127.0.0.0/8"),
            ipaddress.ip_network("169.254.0.0/16"),
            ipaddress.ip_network("100.64.0.0/10"),
            ipaddress.ip_network("::1/128"),
            ipaddress.ip_network("fc00::/7"),
            ipaddress.ip_network("fe80::/10"),
        ]

        try:
            ip = ipaddress.ip_address(ak_client_ip)
            if any(ip in net for net in PRIVATE_NETWORKS):
                return True
        except (ValueError, TypeError):
            return False

        result = ak_call_policy("melotic-geoip-restriction")
        return result.passing

  # Tombstone: remove the old direct GeoIP binding (replaced by wrapper)
  - model: authentik_policies.policybinding
    state: absent
    identifiers:
      order: 0
      target: !KeyOf flow
      policy: !KeyOf geoip-policy

  # Bind the wrapper (not the raw GeoIP policy) to the flow
  - model: authentik_policies.policybinding
    identifiers:
      order: 0
      target: !KeyOf flow
      policy: !KeyOf geoip-wrapper
