---
# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Embedded Proxy Outpost
entries:
  - model: authentik_outposts.outpost
    identifiers:
      name: authentik Embedded Outpost
    attrs:
      name: authentik Embedded Outpost
      type: proxy
      managed: "goauthentik.io/outposts/embedded"
      providers:
        - !Find [authentik_providers_proxy.proxyprovider, [name, longhorn]]
        - !Find [
            authentik_providers_proxy.proxyprovider,
            [name, victoria-metrics],
          ]
        - !Find [authentik_providers_proxy.proxyprovider, [name, victoria-logs]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, alertmanager]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, slskd]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, echo]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, gatus]]
