---
# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: VictoriaLogs Proxy Provider and Application
context:
  authorization_flow:
    !Find &authorization_flow [
      authentik_flows.flow,
      [slug, default-provider-authorization-implicit-consent],
    ]
  invalidation_flow:
    !Find &invalidation_flow [
      authentik_flows.flow,
      [slug, default-provider-invalidation-flow],
    ]
entries:
  - model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: victoria-logs
    attrs:
      name: victoria-logs
      authorization_flow: *authorization_flow
      invalidation_flow: *invalidation_flow
      mode: forward_single
      external_host: https://victoria-logs.melotic.dev
  - model: authentik_core.application
    identifiers:
      slug: victoria-logs
    attrs:
      name: VictoriaLogs
      slug: victoria-logs
      provider:
        !Find [authentik_providers_proxy.proxyprovider, [name, victoria-logs]]
      policy_engine_mode: any
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/victoriametrics.svg
      meta_description: Log management and storage
      open_in_new_tab: true
