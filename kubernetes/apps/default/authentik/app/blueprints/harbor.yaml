---
# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Harbor OAuth2 Provider and Application
context:
  authorization_flow:
    !Find &authorization_flow [
      authentik_flows.flow,
      [slug, default-provider-authorization-implicit-consent],
    ]
  invalidation_flow:
    !Find &invalidation_flow [
      authentik_flows.flow,
      [slug, default-provider-invalidation-flow],
    ]
  property_mappings: &property_mappings
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  signing_key:
    !Find &signing_key [
      authentik_crypto.certificatekeypair,
      [name, authentik Self-signed Certificate],
    ]
entries:
  # OAuth2 Provider for Harbor
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: harbor
    attrs:
      name: harbor
      authorization_flow: *authorization_flow
      invalidation_flow: *invalidation_flow
      client_type: confidential
      client_id: !Env HARBOR_CLIENT_ID
      client_secret: !Env HARBOR_CLIENT_SECRET
      redirect_uris:
        - url: "https://harbor.melotic.dev/c/oidc/callback"
          matching_mode: strict
      property_mappings: *property_mappings
      signing_key: *signing_key

  # Application for Harbor
  - model: authentik_core.application
    identifiers:
      slug: harbor
    attrs:
      name: Harbor
      slug: harbor
      provider:
        !Find [authentik_providers_oauth2.oauth2provider, [name, harbor]]
      policy_engine_mode: any
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/harbor.svg
      meta_description: Container registry
      meta_publisher: Harbor
      open_in_new_tab: true
