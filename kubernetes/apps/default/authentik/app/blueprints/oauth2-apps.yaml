---
version: 1
metadata:
  name: OAuth2 Providers and Applications
context:
  authorization_flow: &authorization_flow !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
  invalidation_flow: &invalidation_flow !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
  property_mappings: &property_mappings
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  signing_key: &signing_key !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
entries:
  # --- Grafana ---
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: grafana
    attrs:
      name: grafana
      authorization_flow: *authorization_flow
      invalidation_flow: *invalidation_flow
      client_type: confidential
      client_id: !Env GRAFANA_CLIENT_ID
      client_secret: !Env GRAFANA_CLIENT_SECRET
      redirect_uris:
        - url: 'https://grafana.{{ env "SECRET_DOMAIN" }}/login/generic_oauth'
          matching_mode: strict
      property_mappings: *property_mappings
      signing_key: *signing_key
  - model: authentik_core.application
    identifiers:
      slug: grafana
    attrs:
      name: Grafana
      slug: grafana
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, grafana]]
      policy_engine_mode: any
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/grafana.svg
      meta_description: Metrics and dashboards
      meta_publisher: Grafana Labs
      open_in_new_tab: true
  - model: authentik_core.group
    identifiers:
      name: grafana-admins
    attrs:
      name: grafana-admins
      is_superuser: false
  - model: authentik_core.group
    identifiers:
      name: grafana-editors
    attrs:
      name: grafana-editors
      is_superuser: false

  # --- Forgejo ---
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: forejo
    attrs:
      name: forejo
      authorization_flow: *authorization_flow
      invalidation_flow: *invalidation_flow
      client_type: confidential
      client_id: !Env FOREJO_CLIENT_ID
      client_secret: !Env FOREJO_CLIENT_SECRET
      redirect_uris:
        - url: 'https://git.{{ env "SECRET_DOMAIN" }}/user/oauth2/authentik/callback'
          matching_mode: strict
      property_mappings: *property_mappings
      signing_key: *signing_key
  - model: authentik_core.application
    identifiers:
      slug: forejo
    attrs:
      name: Forejo
      slug: forejo
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, forejo]]
      policy_engine_mode: any
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/forejo.svg
      meta_description: Self-hosted Git service
      meta_publisher: Forejo
      open_in_new_tab: true
  - model: authentik_core.group
    identifiers:
      name: forejo-admins
    attrs:
      name: forejo-admins
      is_superuser: false

  # --- Harbor ---
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: harbor
    attrs:
      name: harbor
      authorization_flow: *authorization_flow
      invalidation_flow: *invalidation_flow
      client_type: confidential
      client_id: !Env HARBOR_CLIENT_ID
      client_secret: !Env HARBOR_CLIENT_SECRET
      redirect_uris:
        - url: 'https://harbor.{{ env "SECRET_DOMAIN" }}/c/oidc/callback'
          matching_mode: strict
      property_mappings: *property_mappings
      signing_key: *signing_key
  - model: authentik_core.application
    identifiers:
      slug: harbor
    attrs:
      name: Harbor
      slug: harbor
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, harbor]]
      policy_engine_mode: any
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/harbor.svg
      meta_description: Container registry
      meta_publisher: Harbor
      open_in_new_tab: true
  - model: authentik_core.group
    identifiers:
      name: harbor-admins
    attrs:
      name: harbor-admins
      is_superuser: false

  # --- Paperless-ngx ---
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: paperless-ngx
    attrs:
      name: paperless-ngx
      authorization_flow: *authorization_flow
      invalidation_flow: *invalidation_flow
      client_type: confidential
      client_id: !Env PAPERLESS_CLIENT_ID
      client_secret: !Env PAPERLESS_CLIENT_SECRET
      redirect_uris:
        - url: 'https://paperless.{{ env "SECRET_DOMAIN" }}/accounts/oidc/authentik/login/callback/'
          matching_mode: strict
      property_mappings: *property_mappings
      signing_key: *signing_key
  - model: authentik_core.application
    identifiers:
      slug: paperless
    attrs:
      name: Paperless-ngx
      slug: paperless
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, paperless-ngx]]
      policy_engine_mode: any
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/paperless-ngx.svg
      meta_description: Document management system
      meta_publisher: Paperless-ngx
      open_in_new_tab: true
  - model: authentik_core.group
    identifiers:
      name: paperless-admins
    attrs:
      name: paperless-admins
      is_superuser: false
