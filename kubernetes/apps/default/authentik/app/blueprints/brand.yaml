---
# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: melotic Brand
  labels:
    blueprints.goauthentik.io/description: "Matrix-themed branding for sso.melotic.dev"
entries:
  # Apply auth flow blueprint first so the flow exists for the !Find below
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: melotic Authentication Flow
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Invalidation flow
      required: false
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - User settings flow
      required: false

  - model: authentik_brands.brand
    identifiers:
      domain: sso.melotic.dev
    state: present
    attrs:
      domain: sso.melotic.dev
      default: false
      branding_title: melotic
      branding_logo: "zion.svg"
      branding_favicon: "zion.svg"
      branding_default_flow_background: {}

      flow_authentication:
        !Find [authentik_flows.flow, [slug, melotic-authentication-flow]]
      flow_invalidation:
        !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
      flow_user_settings:
        !Find [authentik_flows.flow, [slug, default-user-settings-flow]]
      attributes:
        settings:
          theme:
            base: dark
      branding_custom_css: |
        /* melotic brand — "Matrix" theme for sso.melotic.dev (zion)
         *
         * Inspired by The Matrix: Zion's phosphor-green terminals on a
         * deep black screen, with a soft "digital rain" green glow.
         *
         * Palette:
         *   bg:        #050805  (deep terminal black)
         *   bg-2:      #000000  (pure black vignette)
         *   card:      #0a120a  (translucent panel over the rain)
         *   border:    #1c3a1c  (dim green hairline)
         *   text:      #c8f7c8  (phosphor green-white)
         *   muted:     #5f9f6a  (dim green)
         *   accent:    #00ff41  (matrix green)
         *   accent-2:  #00c853  (deep green)
         */

        :root {
          color-scheme: dark;

          /* PatternFly global overrides */
          --pf-global--BackgroundColor--100: #050805;
          --pf-global--BackgroundColor--200: #000000;
          --pf-global--BackgroundColor--dark-100: #050805;
          --pf-global--BackgroundColor--dark-200: #000000;
          --pf-global--Color--100: #c8f7c8;
          --pf-global--Color--200: #5f9f6a;
          --pf-global--primary-color--100: #00ff41;
          --pf-global--primary-color--200: #00c853;
          --pf-global--link--Color: #00ff41;
          --pf-global--link--Color--hover: #6bff96;
          --pf-global--link--Color--visited: #00ff41;
          --pf-global--BorderColor--100: #1c3a1c;
          --pf-global--FontFamily--text:
            "JetBrains Mono", "Fira Code", "SFMono-Regular", "Cascadia Code",
            ui-monospace, Menlo, Consolas, monospace;
        }

        /* Matrix "digital rain" background — replace the stock landscape with
         * a layered black + green-glow radial field. */
        .pf-c-background-image {
          --pf-c-background-image--BackgroundImage: none !important;
          --pf-c-background-image--BackgroundImage--sm: none !important;
          --pf-c-background-image--BackgroundImage--lg: none !important;
          --pf-c-background-image--BackgroundImage-2x: none !important;
          --pf-c-background-image--Filter: none !important;
          background-image:
            radial-gradient(circle at 50% 0%, rgba(0, 255, 65, 0.10), transparent 55%),
            radial-gradient(circle at 15% 85%, rgba(0, 200, 83, 0.08), transparent 45%),
            linear-gradient(180deg, #050805 0%, #000000 100%) !important;
          background-color: #000000 !important;
        }
        .pf-c-background-image::before {
          content: "" !important;
          display: block !important;
          position: absolute;
          inset: 0;
          pointer-events: none;
          /* faint scanlines for the CRT terminal feel */
          background-image: repeating-linear-gradient(
            0deg,
            rgba(0, 255, 65, 0.035) 0px,
            rgba(0, 255, 65, 0.035) 1px,
            transparent 1px,
            transparent 3px
          );
          opacity: 0.6;
        }
        /* Authentik Lit shadow DOM variable */
        :root, :host {
          --ak-flow-background: none;
        }

        /* Login card — glassy panel with a green glow halo */
        .pf-c-login__main {
          background-color: rgba(10, 18, 10, 0.92) !important;
          border: 1px solid #1c3a1c;
          border-radius: 12px;
          box-shadow:
            0 0 0 1px rgba(0, 255, 65, 0.12),
            0 0 28px rgba(0, 255, 65, 0.18),
            0 18px 48px rgba(0, 0, 0, 0.75);
          backdrop-filter: blur(2px);
        }

        .pf-c-login__main-header {
          padding: 2rem 2.5rem 0 !important;
        }

        .pf-c-login__main-body {
          padding: 2rem 2.5rem !important;
        }

        .pf-c-login__main-footer {
          padding: 0 2.5rem 2rem !important;
        }

        /* Title — phosphor glow */
        .pf-c-login__main-header .pf-c-title {
          color: #e6ffe6 !important;
          letter-spacing: 0.04em;
          text-shadow: 0 0 12px rgba(0, 255, 65, 0.45);
        }

        /* Logo — constrain Zion SVG and give it a subtle glow */
        .pf-c-brand {
          content: "";
          width: 140px;
          height: 34px;
          filter: drop-shadow(0 0 10px rgba(0, 255, 65, 0.35));
        }

        /* Primary action button — neon-green terminal key */
        .pf-c-button.pf-m-primary {
          --pf-c-button--m-primary--BackgroundColor: #00c853;
          --pf-c-button--m-primary--hover--BackgroundColor: #00ff41;
          --pf-c-button--m-primary--active--BackgroundColor: #00b347;
          --pf-c-button--m-primary--Color: #02140a;
          border-radius: 6px;
          font-weight: 700;
          letter-spacing: 0.06em;
          text-transform: uppercase;
          box-shadow: 0 0 18px rgba(0, 255, 65, 0.35);
          transition: box-shadow 0.15s ease, background-color 0.15s ease;
        }
        .pf-c-button.pf-m-primary:hover {
          box-shadow: 0 0 26px rgba(0, 255, 65, 0.55);
        }

        /* Form inputs — terminal fields with a green caret/underline */
        .pf-c-form-control {
          --pf-c-form-control--BackgroundColor: #030503;
          --pf-c-form-control--BorderBottomColor: #1c3a1c;
          --pf-c-form-control--Color: #c8f7c8;
          border-radius: 6px;
          caret-color: #00ff41;
        }

        .pf-c-form-control:focus {
          --pf-c-form-control--focus--BorderBottomColor: #00ff41;
          box-shadow: 0 0 0 1px rgba(0, 255, 65, 0.25),
            0 0 14px rgba(0, 255, 65, 0.20);
        }

        .pf-c-form-control::placeholder {
          color: #4d7a55;
        }

        /* Form labels */
        .pf-c-form__label-text {
          color: #9fe3ab;
        }

        /* Links — matrix green */
        a {
          color: #00ff41;
        }
        a:hover {
          color: #6bff96;
          text-shadow: 0 0 8px rgba(0, 255, 65, 0.45);
        }

        /* Tone down the header/footer on login page */
        .pf-c-login__header,
        .pf-c-login__footer {
          color: #5f9f6a;
        }


        /* Hide locale selector — single-user homelab */
        .pf-c-select.pf-m-align-right {
          display: none !important;
        }
