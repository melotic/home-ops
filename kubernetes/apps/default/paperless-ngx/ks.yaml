---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app paperless-ngx
  namespace: &namespace default
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/volsync
    - ../../../../components/cnpg-database
  dependsOn:
    - name: dragonfly
      namespace: database
    - name: postgres
      namespace: database
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: volsync-system
  path: ./kubernetes/apps/default/paperless-ngx/app
  postBuild:
    substitute:
      APP: paperless-ngx
      ONEPASSWORD_ITEM: paperless-postgres
      PG_DATABASE: paperless
      PG_HOST: postgres-cluster-rw.database.svc.cluster.local
      PG_USER: paperless
      VOLSYNC_CAPACITY: 5Gi
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: false
