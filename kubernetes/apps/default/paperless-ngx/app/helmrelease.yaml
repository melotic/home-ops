---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
spec:
  chartRef:
    kind: OCIRepository
    name: paperless-ngx
  interval: 1h
  values:
    controllers:
      paperless-ngx:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          fix-run:
            image:
              repository: docker.io/library/busybox
              tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
            command: ["sh", "-c", "chown 1000:1000 /run"]
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 3.0.1@sha256:087be9870c285b06fea34cfd6490c02eb3281052f6ff338ca6cd1f068ff3ff28
            env:
              TZ: America/Chicago
              PAPERLESS_DBENGINE: postgresql
              PAPERLESS_DB_OPTIONS: pool.min_size=1,pool.max_size=5
              PAPERLESS_WEBSERVER_WORKERS: "1"
              PAPERLESS_DBHOST: ${PG_HOST:=postgres-cluster-rw.database.svc.cluster.local}
              PAPERLESS_DBNAME: ${PG_DATABASE:=paperless}
              PAPERLESS_DBUSER:
                secretKeyRef:
                  name: &pgsecret paperless-ngx-postgres
                  key: username
              PAPERLESS_DBPASS:
                secretKeyRef:
                  name: *pgsecret
                  key: password
              PAPERLESS_REDIS: redis://dragonfly.database.svc.cluster.local:6379/0
              PAPERLESS_URL: "https://paperless.melotic.dev"
              PAPERLESS_PORT: &port 8000
              USERMAP_UID: "1000"
              USERMAP_GID: "1000"
              PAPERLESS_OCR_LANGUAGE: eng
              PAPERLESS_ARCHIVE_FILE_GENERATION: "auto"
              PAPERLESS_CONSUMER_POLLING_INTERVAL: "60"
              PAPERLESS_CONSUMER_DELETE_DUPLICATES: "true"
              # ponytail: OCR currently OOMs at 2Gi with parallel consumes; raise memory before raising these.
              PAPERLESS_TASK_WORKERS: "1"
              PAPERLESS_THREADS_PER_WORKER: "1"
              PAPERLESS_TIKA_ENABLED: "true"
              PAPERLESS_TIKA_ENDPOINT: http://localhost:9998
              PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://localhost:3000
              PAPERLESS_EMAIL_HOST: smtp-relay.default.svc.cluster.local
              PAPERLESS_EMAIL_PORT: "587"
              PAPERLESS_EMAIL_HOST_USER: ""
              PAPERLESS_EMAIL_HOST_PASSWORD: ""
              PAPERLESS_EMAIL_USE_TLS: "false"
              PAPERLESS_EMAIL_FROM: noreply@melotic.dev
              PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
              PAPERLESS_LOGOUT_REDIRECT_URL: https://sso.melotic.dev/application/o/paperless/end-session/
              PAPERLESS_SOCIAL_AUTO_SIGNUP: "true"
              PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS: "true"
              PAPERLESS_DISABLE_REGULAR_LOGIN: "true"
              PAPERLESS_REDIRECT_LOGIN_TO_SSO: "true"
              PAPERLESS_GMAIL_OAUTH_CLIENT_ID:
                secretKeyRef:
                  name: paperless-secret
                  key: GMAIL_OAUTH_CLIENT_ID
              PAPERLESS_GMAIL_OAUTH_CLIENT_SECRET:
                secretKeyRef:
                  name: paperless-secret
                  key: GMAIL_OAUTH_CLIENT_SECRET
              PAPERLESS_SOCIALACCOUNT_PROVIDERS:
                secretKeyRef:
                  name: paperless-secret
                  key: PAPERLESS_SOCIALACCOUNT_PROVIDERS
            envFrom:
              - secretRef:
                  name: paperless-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 2Gi
          tika:
            image:
              repository: docker.io/apache/tika
              tag: 3.3.1.0@sha256:90b7fa1dc018434075fce9e1d9b88b1e3d0ea6979d0cf86e116c79a8073ae973
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 512Mi
          gotenberg:
            image:
              repository: docker.io/gotenberg/gotenberg
              tag: "8.34.0@sha256:67097317623a503ba2a6a7e9ae8db6929a1f7e1bbd88077bacf2d325fbdab923"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            command:
              - gotenberg
              - --chromium-disable-javascript=true
              - --chromium-allow-list=file:///tmp/.*
            resources:
              requests:
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 988
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "paperless.melotic.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: paperless-ngx
        globalMounts:
          - path: /usr/src/paperless/data
      media:
        type: nfs
        server: construct.melotic.dev
        path: /var/nfs/shared/k8s/paperless/media
        globalMounts:
          - path: /usr/src/paperless/media
      consume:
        type: nfs
        server: construct.melotic.dev
        path: /var/nfs/shared/k8s/paperless/consume
        globalMounts:
          - path: /usr/src/paperless/consume
      export:
        type: nfs
        server: construct.melotic.dev
        path: /var/nfs/shared/k8s/paperless/export
        globalMounts:
          - path: /usr/src/paperless/export
      tmp:
        type: emptyDir
      run:
        type: emptyDir
        globalMounts:
          - path: /run
