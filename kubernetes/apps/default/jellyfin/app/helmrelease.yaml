---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  chartRef:
    kind: OCIRepository
    name: jellyfin
  interval: 1h
  values:
    controllers:
      jellyfin:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          migration-recovery:
            image:
              repository: docker.io/library/busybox
              tag: 1.38.0
            command:
              - /bin/sh
              - -c
              - |
                MARKER="/config/recovery-backups/10.11-migration-xml-disabled"
                if [ -f "$MARKER" ]; then
                  echo "migration-recovery: already applied, skipping"
                  exit 0
                fi
                TS=$(date +%Y%m%d-%H%M%S)
                BACKUP_DIR="/config/recovery-backups/${TS}"
                mkdir -p "$BACKUP_DIR"
                # Backup key files if they exist
                for f in \
                  /config/data/jellyfin.db \
                  /config/data/library.db \
                  /config/config/migrations.xml \
                  /config/config/migration.xml \
                  /config/migrations.xml \
                  /config/migration.xml; do
                  if [ -f "$f" ]; then
                    cp "$f" "$BACKUP_DIR/$(echo "$f" | sed 's|/|_|g')"
                    echo "backed up: $f"
                  fi
                done
                # Rename legacy migration XML files out of the way
                for f in \
                  /config/config/migrations.xml \
                  /config/config/migration.xml \
                  /config/migrations.xml \
                  /config/migration.xml; do
                  if [ -f "$f" ]; then
                    mv "$f" "${f}.disabled-${TS}"
                    echo "disabled: $f -> ${f}.disabled-${TS}"
                  fi
                done
                # Write marker so this is idempotent
                mkdir -p /config/recovery-backups
                echo "applied at ${TS}" > "$MARKER"
                echo "migration-recovery: done"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
        containers:
          app:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.10@sha256:6497f0245de93fac642926c065b427362ca5e626e659f690516599c8c3817a38
            env:
              TZ: America/Chicago
              JELLYFIN_PublishedServerUrl: https://jellyfin.melotic.dev
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
                squat.ai/video: 1
              limits:
                memory: 4Gi
                squat.ai/video: 1
    defaultPodOptions:
      automountServiceAccountToken: false
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [k8s-trinity]
            - weight: 50
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [k8s-niobe, k8s-ghost]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.60.80.8
        externalTrafficPolicy: Local
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.melotic.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      config:
        existingClaim: jellyfin
      cache:
        type: emptyDir
        globalMounts:
          - path: /cache
      media:
        type: nfs
        server: 10.60.10.20
        path: /var/nfs/shared/data
        globalMounts:
          - path: /data/media
            subPath: media
            readOnly: true
      tmp:
        type: emptyDir
