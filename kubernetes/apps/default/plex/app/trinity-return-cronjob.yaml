---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/batch/cronjob_v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: plex-trinity-return
  namespace: default
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: plex-trinity-return
          automountServiceAccountToken: true
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            fsGroupChangePolicy: OnRootMismatch
          containers:
            - name: return
              image: registry.k8s.io/kubectl:v1.36.0
              command:
                - /bin/sh
                - -c
                - |
                  set -eu

                  trinity_ready="$(kubectl get node k8s-trinity -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')"
                  trinity_unschedulable="$(kubectl get node k8s-trinity -o jsonpath='{.spec.unschedulable}')"
                  plex_node="$(kubectl get pod -n default -l app.kubernetes.io/name=plex -o jsonpath='{.items[0].spec.nodeName}' 2>/dev/null || echo "none")"

                  if [ -z "$plex_node" ]; then
                    plex_node="none"
                  fi

                  if [ "$trinity_ready" = "True" ] && [ "$trinity_unschedulable" != "true" ] && [ "$plex_node" != "k8s-trinity" ] && [ "$plex_node" != "none" ]; then
                    kubectl delete pod -n default -l app.kubernetes.io/name=plex --grace-period=30
                  fi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
