---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nas-backup
spec:
  schedule: "30 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 14400
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
          containers:
            - name: rclone
              image: docker.io/rclone/rclone:1.73.5
              args:
                - copy
                - /source
                - "azure:nas-backup/k8s"
                - --config=/config/rclone.conf
                - --verbose
                - --transfers=4
                - --checkers=8
                - --fast-list
                - --exclude=/pvc-*/**
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: rclone-config
                  mountPath: /config
                  readOnly: true
                - name: nfs-source
                  mountPath: /source
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
          volumes:
            - name: rclone-config
              secret:
                secretName: nas-backup-secret
                items:
                  - key: RCLONE_CONFIG
                    path: rclone.conf
            - name: nfs-source
              nfs:
                server: construct.melotic.dev
                path: /var/nfs/shared/k8s
                readOnly: true
            - name: tmp
              emptyDir: {}
