---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  chartRef:
    kind: OCIRepository
    name: seerr
  interval: 1h
  values:
    controllers:
      seerr:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          fix-media-server-type:
            image:
              repository: docker.io/alpine/k8s
              tag: 1.35.0@sha256:18bc02c1e0df04451f4f9194eb7b7341c1165da5495459b52f85f72fb9545032
            command:
              - /bin/sh
              - -c
              - |
                SETTINGS="/app/config/settings.json"
                if [ ! -f "$SETTINGS" ]; then
                  echo "settings.json not found, skipping"
                  exit 0
                fi
                MEDIA_TYPE=$(jq -r '.main.mediaServerType // empty' "$SETTINGS")
                if [ "$MEDIA_TYPE" != "4" ]; then
                  echo "mediaServerType=$MEDIA_TYPE, no fix needed"
                  exit 0
                fi
                # Only fix if Plex config is clearly present
                PLEX_IP=$(jq -r '.plex.ip // empty' "$SETTINGS")
                PLEX_HOSTNAME=$(jq -r '.plex.hostname // empty' "$SETTINGS")
                if [ -z "$PLEX_IP" ] && [ -z "$PLEX_HOSTNAME" ]; then
                  echo "No Plex config found, not safe to auto-fix"
                  exit 0
                fi
                echo "GUARD: mediaServerType=4 with Plex configured, restoring to 1"
                jq '.main.mediaServerType = 1' "$SETTINGS" > "$SETTINGS.tmp" && \
                  mv "$SETTINGS.tmp" "$SETTINGS"
                echo "Fixed mediaServerType=$(jq -r '.main.mediaServerType' "$SETTINGS")"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
        containers:
          app:
            image:
              repository: ghcr.io/seerr-team/seerr
              tag: v3.2.0@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad
            env:
              DB_HOST: ${PG_HOST:=postgres-cluster-rw.database.svc.cluster.local}
              DB_NAME: ${PG_DATABASE:=${APP}}
              DB_TYPE: postgres
              DB_USER:
                secretKeyRef:
                  name: &pgsecret seerr-postgres
                  key: username
              DB_PASS:
                secretKeyRef:
                  name: *pgsecret
                  key: password
              LOG_LEVEL: info
              PORT: &port 80
              TZ: Etc/UTC
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/status
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions:
              - "[STATUS] == 200"
              - "[BODY].mediaServerType == 1"
            url: https://seerr.melotic.dev/api/v1/settings/public
        hostnames:
          - "seerr.melotic.dev"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
    persistence:
      config:
        existingClaim: seerr
        globalMounts:
          - path: /app/config
      tmp:
        type: emptyDir
