---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: aurral
spec:
  chartRef:
    kind: OCIRepository
    name: aurral
  interval: 1h
  values:
    controllers:
      aurral:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/lklynet/aurral
              tag: latest
            env:
              TZ: America/Chicago
              DOWNLOAD_FOLDER: /data/aurral-weekly-flow
              WEEKLY_FLOW_FOLDER: /app/backend/data/weekly-flow
              LIDARR_URL: http://lidarr.default.svc.cluster.local
              MUSICBRAINZ_CONTACT: hi@melotic.xyz
            envFrom:
              - secretRef:
                  name: aurral-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3001
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 988
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        forceRename: "{{ .Release.Name }}"
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - aurral.melotic.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: aurral
        globalMounts:
          - path: /app/backend/data
      downloads:
        type: nfs
        server: construct.melotic.dev
        path: /var/nfs/shared/data
        advancedMounts:
          aurral:
            app:
              - path: /data/aurral-weekly-flow
                subPath: aurral-weekly-flow
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
