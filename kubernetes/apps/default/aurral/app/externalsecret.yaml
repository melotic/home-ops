---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aurral
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: aurral-secret
  data:
    - secretKey: LASTFM_API_KEY
      remoteRef:
        key: lastfm
        property: LASTFM_API_KEY
    - secretKey: LASTFM_USERNAME
      remoteRef:
        key: lastfm
        property: LASTFM_USERNAME
    - secretKey: LIDARR_API_KEY
      remoteRef:
        key: lidarr
        property: LIDARR_API_KEY
