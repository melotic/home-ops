---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firefly
spec:
  chartRef:
    kind: OCIRepository
    name: firefly
  interval: 1h
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      firefly:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/fireflyiii/core
              tag: version-6.6.6@sha256:ae69fdd95cdef9038cd7a460a5aec731f14813973e4f096511d5a4ea9ff0e972
            env:
              TZ: America/Chicago
              APP_ENV: production
              APP_URL: "https://firefly.melotic.dev"
              SITE_OWNER: justinmp215@gmail.com
              DEFAULT_LANGUAGE: en_US
              TRUSTED_PROXIES: "**"
              LOG_CHANNEL: stack
              APP_LOG_LEVEL: notice
              DB_CONNECTION: pgsql
              DB_HOST: postgres-cluster-rw.database.svc.cluster.local
              DB_PORT: "5432"
              DB_DATABASE: firefly
              DB_USERNAME:
                secretKeyRef:
                  name: &pgsecret firefly-postgres
                  key: username
              DB_PASSWORD:
                secretKeyRef:
                  name: *pgsecret
                  key: password
              APP_KEY:
                secretKeyRef:
                  name: &secret firefly-secret
                  key: APP_KEY
              STATIC_CRON_TOKEN:
                secretKeyRef:
                  name: *secret
                  key: STATIC_CRON_TOKEN
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
          mcp:
            image:
              repository: docker.io/library/node
              tag: 22-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
            command:
              - npx
              - -y
              - "@firefly-iii-mcp/server@1.4.0"
            env:
              PORT: "3000"
              HOME: /tmp
              NPM_CONFIG_CACHE: /tmp/.npm
              FIREFLY_III_BASE_URL: "http://localhost:8080"
              FIREFLY_III_PRESET: full
              FIREFLY_III_PAT:
                secretKeyRef:
                  name: *secret
                  key: FIREFLY_III_PAT
            probes:
              liveness: &mprobes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *mprobes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
      # Both PHP images bind 8080 and 9000, so the importer cannot share the core pod.
      firefly-importer:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/fireflyiii/data-importer
              tag: version-2.3.3@sha256:376b52a3abc92ea459b9b77c7be594e5abf9c845e80eccbbe6bda0af67859c31
            env:
              TZ: America/Chicago
              APP_URL: "https://firefly-import.melotic.dev"
              APP_ENV: production
              LOG_CHANNEL: stack
              TRUSTED_PROXIES: "**"
              EXPECT_SECURE_URL: "true"
              FIREFLY_III_URL: "http://firefly.default.svc.cluster.local:8080"
              VANITY_URL: "https://firefly.melotic.dev"
              FIREFLY_III_ACCESS_TOKEN:
                secretKeyRef:
                  name: *secret
                  key: FIREFLY_III_ACCESS_TOKEN
              SIMPLEFIN_TOKEN:
                secretKeyRef:
                  name: *secret
                  key: SIMPLEFIN_TOKEN
              CAN_POST_AUTOIMPORT: "true"
              AUTO_IMPORT_SECRET:
                secretKeyRef:
                  name: *secret
                  key: WEBHOOK_SECRET
              IMPORT_DIR_ALLOWLIST: /import
            probes:
              liveness: &iprobes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *iprobes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 33
        runAsGroup: 33
        fsGroup: 33
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: firefly
        ports:
          http:
            port: 8080
      mcp:
        controller: firefly
        ports:
          http:
            port: 3000
      importer:
        controller: firefly-importer
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames:
          - "firefly.melotic.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 8080
      importer:
        hostnames:
          - "firefly-import.melotic.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: importer
                port: 8080
      mcp:
        hostnames:
          - "firefly-mcp.melotic.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: mcp
                port: 3000
    persistence:
      import:
        type: emptyDir
        advancedMounts:
          firefly-importer:
            app:
              - path: /import
