---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: listenbrainz-discovery
spec:
  chartRef:
    kind: OCIRepository
    name: listenbrainz-discovery
  interval: 1h
  values:
    controllers:
      listenbrainz-discovery:
        type: cronjob
        cronjob:
          schedule: "0 0 * * 0"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
          backoffLimit: 1
          activeDeadlineSeconds: 600
          ttlSecondsAfterFinished: 86400
        pod:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 988
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: python
              tag: 3.12-slim
            command:
              - python3
              - -c
              - |
                import json, os, time, urllib.request, urllib.error, sys

                LZ_TOKEN = os.environ["LZ_TOKEN"]
                LZ_USER = os.environ["LZ_USER"]
                LIDARR_KEY = os.environ["LIDARR_API_KEY"]
                LIDARR_URL = "http://lidarr.default.svc.cluster.local:80"

                def api_get(url, headers=None):
                    req = urllib.request.Request(url, headers=headers or {})
                    with urllib.request.urlopen(req, timeout=30) as resp:
                        return json.loads(resp.read())

                def api_post(url, data, headers=None):
                    payload = json.dumps(data).encode()
                    req = urllib.request.Request(url, data=payload, headers=headers or {}, method="POST")
                    with urllib.request.urlopen(req, timeout=30) as resp:
                        return json.loads(resp.read())

                # Fetch ListenBrainz CF recommendations
                print(f"[*] Fetching CF recommendations for {LZ_USER}...")
                lb_url = f"https://api.listenbrainz.org/1/cf/recommendation/user/{LZ_USER}/recording?count=50"
                try:
                    lb_data = api_get(lb_url, {"Authorization": f"Token {LZ_TOKEN}"})
                except urllib.error.HTTPError as e:
                    print(f"[!] ListenBrainz API error: {e.code} {e.reason}")
                    sys.exit(1)

                recs = lb_data.get("payload", {}).get("mbids", [])
                if not recs:
                    print("[*] No recommendations found. Exiting.")
                    sys.exit(0)

                print(f"[*] Got {len(recs)} recommendations. Resolving artists via MusicBrainz...")

                # Resolve recording MBIDs to artist MBIDs via MusicBrainz
                artists = {}
                for rec in recs:
                    mbid = rec.get("recording_mbid")
                    if not mbid:
                        continue
                    try:
                        mb_url = f"https://musicbrainz.org/ws/2/recording/{mbid}?inc=artists&fmt=json"
                        mb_data = api_get(mb_url, {"User-Agent": "ListenBrainzDiscovery/1.0 (hi@melotic.xyz)"})
                        for credit in mb_data.get("artist-credit", []):
                            artist = credit.get("artist", {})
                            aid = artist.get("id")
                            aname = artist.get("name")
                            if aid and aname and aid not in artists:
                                artists[aid] = aname
                    except Exception as e:
                        print(f"[!] MB lookup failed for {mbid}: {e}")
                    time.sleep(1)

                print(f"[*] Found {len(artists)} unique artists. Checking Lidarr...")

                headers = {"X-Api-Key": LIDARR_KEY, "Content-Type": "application/json"}
                added = 0
                for artist_mbid, artist_name in artists.items():
                    try:
                        existing = api_get(f"{LIDARR_URL}/api/v1/artist?mbId={artist_mbid}", headers)
                        if existing:
                            print(f"  [=] Already in Lidarr: {artist_name}")
                            continue
                    except urllib.error.HTTPError:
                        pass

                    try:
                        payload = {
                            "foreignArtistId": artist_mbid,
                            "artistName": artist_name,
                            "qualityProfileId": 1,
                            "metadataProfileId": 1,
                            "rootFolderPath": "/data/media/music",
                            "monitored": True,
                            "addOptions": {"monitor": "all"},
                        }
                        api_post(f"{LIDARR_URL}/api/v1/artist", payload, headers)
                        print(f"  [+] Added to Lidarr: {artist_name} ({artist_mbid})")
                        added += 1
                    except urllib.error.HTTPError as e:
                        body = e.read().decode() if hasattr(e, "read") else ""
                        print(f"  [!] Failed to add {artist_name}: {e.code} {body[:200]}")
                    except Exception as e:
                        print(f"  [!] Failed to add {artist_name}: {e}")

                print(f"[*] Done. Added {added} new artist(s) to Lidarr.")
            envFrom:
              - secretRef:
                  name: listenbrainz-discovery-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
