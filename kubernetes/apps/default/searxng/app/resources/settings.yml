use_default_settings: true

general:
  instance_name: "melotic"

ui:
  center_alignment: false
  hotkeys: vim
  query_in_title: false
  results_on_new_tab: true
  search_on_category_select: true
  theme_args:
    simple_style: dark
  url_formatting: full

categories_as_tabs:
  general:
  it:
  science:
  news:
  images:
  videos:
  files:

server:
  limiter: false
  public_instance: false
  image_proxy: true
  method: "POST"

valkey:
  url: "valkey://dragonfly.database.svc.cluster.local:6379/8"

search:
  autocomplete: "duckduckgo"
  safe_search: 0
  default_lang: "en"
  doi_resolver: "oadoi.org"
  formats:
    - html
    - json
  # Defaults are 86400s (1 day) for access denied/CAPTCHA which is way too aggressive.
  suspended_times:
    SearxEngineAccessDenied: 60
    SearxEngineCaptcha: 120
    SearxEngineTooManyRequests: 30
    cf_SearxEngineCaptcha: 1296000
    cf_SearxEngineAccessDenied: 86400
    recaptcha_SearxEngineCaptcha: 604800

outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0
  enable_http2: true

engines:
  - name: brave
    disabled: false

  - name: bing
    disabled: false
    weight: 1.0
  - name: bing images
    disabled: false
    weight: 1.0
  - name: bing news
    disabled: false
    weight: 1.0
  - name: bing videos
    disabled: false
    weight: 1.0

