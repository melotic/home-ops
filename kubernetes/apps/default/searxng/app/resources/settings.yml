use_default_settings: true
general:
  instance_name: "melotic"
ui:
  center_alignment: true
  hotkeys: vim
  query_in_title: false
  results_on_new_tab: true
  theme_args:
    simple_style: black
  url_formatting: full
categories_as_tabs:
  general:
  it:
  science:
  news:
  images:
  videos:
  files:
server:
  limiter: false
  public_instance: false
  image_proxy: true
  method: "POST"
valkey:
  url: "valkey://dragonfly.database.svc.cluster.local:6379/8"
search:
  autocomplete: "duckduckgo"
  safe_search: 0
  default_lang: "en"
  formats:
    - html
    - json
outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0
  enable_http2: true
engines:
  # Bing as primary
  - name: bing
    disabled: false
    weight: 1.5
  - name: bing images
    disabled: false
    weight: 1.5
  - name: bing news
    disabled: false
    weight: 1.5
  - name: bing videos
    disabled: false
    weight: 1.5
  # De-prioritize Google (still useful, just not primary)
  - name: google
    weight: 0.8
  # Security research & academic
  - name: arxiv
    disabled: false
  - name: github
    disabled: false
  - name: gitlab
    disabled: false
  # Developer Q&A
  - name: stackoverflow
    disabled: false
  - name: superuser
    disabled: false
  - name: askubuntu
    disabled: false
  # Package indexes
  - name: crates.io
    disabled: false
  - name: pypi
    disabled: false
  - name: npm
    disabled: false
  # Linux documentation
  - name: arch linux wiki
    disabled: false
  - name: gentoo
    disabled: false
  # Security/tech discussion
  - name: hackernews
    disabled: false
  - name: lobste.rs
    disabled: false
  # Noise reduction
  - name: pinterest
    disabled: true
  - name: 9gag
    disabled: true
