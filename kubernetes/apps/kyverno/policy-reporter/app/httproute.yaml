kind: HTTPRoute
metadata:
  name: policy-reporter-ui
spec:
  hostnames:
    - policy-reporter.melotic.dev
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: policy-reporter-ui
          port: 8080
