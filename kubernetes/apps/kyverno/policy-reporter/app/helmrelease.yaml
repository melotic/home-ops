---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: policy-reporter
spec:
  interval: 1h
  chart:
    spec:
      chart: policy-reporter
      version: 3.7.4
      sourceRef:
        kind: HelmRepository
        name: policy-reporter
        namespace: kyverno
  install:
    remediation:
      retries: -1
  values:
    ui:
      enabled: true
      openIDConnect:
        enabled: true
        discoveryUrl: "https://auth.${SECRET_DOMAIN}/application/o/policy-reporter/.well-known/openid-configuration"
        callbackUrl: "https://policy-reporter.${SECRET_DOMAIN}/callback"
        clientId: ""
        clientSecret: ""
        secretRef: policy-reporter-oidc
        scopes:
          - openid
          - email
          - profile
        groupClaim: groups
      httproute:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        hostnames:
          - "policy-reporter.${SECRET_DOMAIN}"
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /

    plugin:
      kyverno:
        enabled: true

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1234
      runAsGroup: 1234
      fsGroup: 1234
      fsGroupChangePolicy: OnRootMismatch

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
