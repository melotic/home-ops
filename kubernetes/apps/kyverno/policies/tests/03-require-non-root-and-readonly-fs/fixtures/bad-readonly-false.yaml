kind: Pod
metadata:
  name: bad-readonly-false
  namespace: default
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: app
      image: ghcr.io/kyverno/kyverno:v1.18.0
      securityContext:
        readOnlyRootFilesystem: false
