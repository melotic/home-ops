---
# Good fixture — pod-level runAsNonRoot with container read-only root filesystem
apiVersion: v1
kind: Pod
metadata:
  name: good-pod-level-nonroot
  namespace: default
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: app
      image: ghcr.io/kyverno/kyverno:v1.18.0
      securityContext:
        readOnlyRootFilesystem: true
