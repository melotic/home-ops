---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: volsync
spec:
  groups:
    - name: volsync.rules
      rules:
        - alert: VolSyncComponentAbsent
          expr: |-
            absent(up{job="volsync-metrics"})
          annotations:
            summary: >-
              VolSync component has disappeared from Prometheus target discovery
          for: 5m
          labels:
            severity: critical

        - alert: VolSyncVolumeOutOfSync
          expr: |-
            volsync_volume_out_of_sync == 1
          annotations:
            summary: >-
              {{ $labels.obj_namespace }}/{{ $labels.obj_name }} volume is out of sync
          for: 5m
          labels:
            severity: warning

        - alert: VolSyncMissedInterval
          expr: |-
            increase(volsync_missed_intervals_total{role="source"}[13h]) > 0
          annotations:
            summary: >-
              {{ $labels.obj_namespace }}/{{ $labels.obj_name }} missed a scheduled VolSync backup interval
          for: 15m
          labels:
            severity: warning

        - alert: VolSyncSourceBackupStale
          expr: |-
            volsync_volume_out_of_sync{role="source"} == 1
          annotations:
            summary: >-
              {{ $labels.obj_namespace }}/{{ $labels.obj_name }} VolSync backup has been stale for more than 1 hour
          for: 1h
          labels:
            severity: critical

        - alert: KopiaAzureSyncFailed
          expr: |-
            kube_job_status_failed{namespace="default", job_name=~"kopia-azure-sync-.*"} > 0
          annotations:
            summary: >-
              Kopia Azure sync job {{ $labels.job_name }} failed
          for: 10m
          labels:
            severity: critical

        - alert: KopiaAzureSyncStale
          expr: |-
            time() - kube_cronjob_status_last_successful_time{namespace="default", cronjob="kopia-azure-sync"} > 172800
          annotations:
            summary: >-
              Kopia Azure sync has not completed successfully in more than 48 hours
          for: 15m
          labels:
            severity: critical

        - alert: KopiaMaintenanceJobFailed
          expr: |-
            kube_job_status_failed{namespace="volsync-system", job_name=~"kopia-maint-.*"} > 0
          annotations:
            summary: >-
              Kopia maintenance job {{ $labels.job_name }} failed
          for: 10m
          labels:
            severity: warning
