---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
#
# OPERATOR PRE-FLIGHT (1Password dependency)
# ------------------------------------------
# Item: gitlab-runner
#   field `registration_token` -> legacy runner registration token (GitLab 14-15)
#   field `runner_token`       -> new runner authentication token (GitLab 16+)
# Both populated for forward/backward compat with chart 0.88.1 and future
# GitLab upgrades. Generate in GitLab UI: Admin → CI/CD → Runners → New
# instance runner; copy the resulting authentication token into 1Password.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-runner-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  refreshInterval: 5m
  target:
    name: gitlab-runner-token
    template:
      type: Opaque
      data:
        # Both legacy (GitLab 14-15) and new (GitLab 16+) chart auth flows.
        # Chart consumes whichever key its version expects; populating both
        # keeps a future GitLab upgrade from breaking auth.
        runner-registration-token: "{{ .registration_token }}"
        runner-token: "{{ .runner_token }}"
  dataFrom:
    - extract:
        key: gitlab-runner
