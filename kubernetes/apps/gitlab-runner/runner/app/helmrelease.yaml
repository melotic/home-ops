---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab-runner
spec:
  interval: 1h
  chart:
    spec:
      chart: gitlab-runner
      version: 0.90.1
      sourceRef:
        kind: HelmRepository
        name: gitlab-runner
        namespace: gitlab-runner
  install:
    remediation:
      retries: -1
  values:
    gitlabUrl: https://gitlab.melotic.dev/
    # The chart's singular `secret:` value does NOT mount the named Secret
    # at /secrets/. Use the plural `secrets:` list (documented mechanism
    # for projecting external secrets) so /secrets/runner-token is populated
    # from the ExternalSecret-managed Secret. The entrypoint then exports
    # CI_SERVER_TOKEN before calling `gitlab-runner register`.
    secrets:
      - name: gitlab-runner-token
    runnerRegistrationToken: ""
    runnerToken: ""

    # The runner CLI is non-root (uid 1000) and resolves its default
    # state_file and config.toml under $HOME/.gitlab-runner/. Without HOME
    # set, it defaults to /.gitlab-runner/ which is blocked by
    # readOnlyRootFilesystem: true (observed: "Couldn't save new system ID
    # on state file" warning). The chart already mounts an emptyDir at
    # /home/gitlab-runner/.gitlab-runner, so setting HOME there makes all
    # default writes land on a writable volume — keeping ROFS enabled.
    extraEnv:
      HOME: /home/gitlab-runner

    rbac:
      create: true
      clusterWideAccess: false
      rules:
        - apiGroups: [""]
          resources: [pods, pods/exec, pods/attach]
          verbs: [get, list, watch, create, update, patch, delete]
        - apiGroups: [""]
          resources: [pods/log]
          verbs: [get, list]
        - apiGroups: [""]
          resources: [secrets, configmaps]
          verbs: [get, list, watch, create, update, patch, delete]
        - apiGroups: [""]
          resources: [events]
          verbs: [list, watch]
        - apiGroups: [""]
          resources: [serviceaccounts]
          verbs: [get]
        - apiGroups: [""]
          resources: [services]
          verbs: [get, create]

    serviceAccount:
      create: true
      name: gitlab-runner

    # Controller pod (gitlab-runner manager).
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: [ALL]

    podAnnotations:
      reloader.stakater.com/auto: "true"

    # readOnlyRootFilesystem: true blocks the runner manager from buffering
    # job traces, which it writes under /tmp/trace* before shipping to the
    # GitLab API. Without a writable /tmp, jobs fail with "create job trace:
    # open /tmp/traceXXXX: read-only file system" and surface to the user as
    # "There has been a runner system failure, please try again."
    volumes:
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

    # config.toml for the K8s executor — controls per-job pod security.
    runners:
      cache:
        secretName: gitlab-runner-cache-credentials
      config: |
        [[runners]]
          executor = "kubernetes"
          # Avoid long-polling request bottleneck (chart logs WARNING when =1).
          request_concurrency = 4
          cache_dir = "/cache"
          [runners.cache]
            Type = "s3"
            Path = "gitlab-runner"
            Shared = true
            [runners.cache.s3]
              ServerAddress = "rook-ceph-rgw-gitlab-rgw.rook-ceph.svc:80"
              BucketName = "gitlab-runner-cache"
              BucketLocation = "us-east-1"
              Insecure = true
          # FF_* flags keep Kubernetes executor behavior safer and more
          # diagnosable: entrypoint parity, pod event logging, token-free Git
          # URLs, stricter Bash exit handling, script log sections, failed-cache
          # cleanup, and predictable TLS-chain behavior.
          # DOCKER_CONFIG: defense-in-depth default for Kaniko/Buildah jobs.
          # The build pod runs as uid 1000 (PSS=restricted), but the kaniko
          # image's /kaniko directory is root-owned 0755 — so writing Docker
          # auth to the default /kaniko/.docker/config.json fails with
          # `Permission denied` in step_script. /tmp is mounted as a
          # writable emptyDir on every build pod, and kaniko's executor
          # honors $DOCKER_CONFIG ahead of its /kaniko/.docker default.
          environment = [
            "FF_USE_FASTZIP=true",
            "DOCKER_CONFIG=/tmp/.docker",
            "FF_KUBERNETES_HONOR_ENTRYPOINT=true",
            "FF_PRINT_POD_EVENTS=true",
            "FF_GIT_URLS_WITHOUT_TOKENS=true",
            "FF_ENABLE_BASH_EXIT_CODE_CHECK=true",
            "FF_USE_NEW_BASH_EVAL_STRATEGY=true",
            "FF_SCRIPT_SECTIONS=true",
            "FF_CLEAN_UP_FAILED_CACHE_EXTRACT=true",
            "FF_RESOLVE_FULL_TLS_CHAIN=false",
          ]
          [runners.kubernetes]
            namespace = "gitlab-runner"
            image = "docker.io/library/alpine:3.20"
            helper_image = ""
            helper_image_flavor = "ubuntu"
            # CI job images own their package database and often need root for
            # setup (`apk add`, apt, cargo toolchain installs). Namespace PSA is
            # baseline, and PolicyReports suppress this known CI surface only.
            # Runner-set contexts below keep no-priv-esc + dropped caps.
            privileged = false
            poll_interval = 5
            poll_timeout = 600
            pod_termination_grace_period_seconds = 30
            cleanup_resources_timeout = "10m"
            print_pod_warning_events = true
            service_account = "gitlab-runner"
            allow_privilege_escalation = false
            [runners.kubernetes.pod_security_context]
              fs_group = 1000
            [runners.kubernetes.pod_security_context.seccomp_profile]
              type = "RuntimeDefault"
            [runners.kubernetes.build_container_security_context]
              allow_privilege_escalation = false
              read_only_root_filesystem = false
              [runners.kubernetes.build_container_security_context.capabilities]
                drop = ["ALL"]
              [runners.kubernetes.build_container_security_context.seccomp_profile]
                type = "RuntimeDefault"
            [runners.kubernetes.helper_container_security_context]
              allow_privilege_escalation = false
              read_only_root_filesystem = false
              run_as_non_root = true
              run_as_user = 1000
              [runners.kubernetes.helper_container_security_context.capabilities]
                drop = ["ALL"]
              [runners.kubernetes.helper_container_security_context.seccomp_profile]
                type = "RuntimeDefault"
            # Auto-injected svc-* service containers (e.g. Redis, Postgres
            # declared via `services:` in .gitlab-ci.yml) are job-owned images
            # like the build container, so don't force a UID; baseline PSA lets
            # them start while caps/no-priv-esc still apply.
            [runners.kubernetes.service_container_security_context]
              allow_privilege_escalation = false
              read_only_root_filesystem = false
              [runners.kubernetes.service_container_security_context.capabilities]
                drop = ["ALL"]
              [runners.kubernetes.service_container_security_context.seccomp_profile]
                type = "RuntimeDefault"
            # The auto-injected init-permissions container only drops NET_RAW by
            # default, which violates the namespace's restricted PSS. Mirror the
            # helper container's hardened context so build pods are admitted.
            [runners.kubernetes.init_permissions_container_security_context]
              allow_privilege_escalation = false
              read_only_root_filesystem = true
              run_as_non_root = true
              run_as_user = 1000
              [runners.kubernetes.init_permissions_container_security_context.capabilities]
                drop = ["ALL"]
              [runners.kubernetes.init_permissions_container_security_context.seccomp_profile]
                type = "RuntimeDefault"
            [[runners.kubernetes.volumes.empty_dir]]
              name = "build-tmp"
              mount_path = "/builds"
              medium = ""
              mount_propagation = "None"
            [[runners.kubernetes.volumes.empty_dir]]
              name = "tmp"
              mount_path = "/tmp"
              medium = ""
              mount_propagation = "None"
            [[runners.kubernetes.volumes.empty_dir]]
              name = "cache"
              mount_path = "/cache"
              medium = ""
              mount_propagation = "None"
            [[runners.kubernetes.volumes.secret]]
              name = "buildkit-client-certs"
              mount_path = "/certs"
              read_only = true

    concurrent: 4
    checkInterval: 3
