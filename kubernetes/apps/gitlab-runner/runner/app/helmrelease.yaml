---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab-runner
spec:
  interval: 1h
  chart:
    spec:
      chart: gitlab-runner
      version: 0.88.1
      sourceRef:
        kind: HelmRepository
        name: gitlab-runner
        namespace: gitlab-runner
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    gitlabUrl: https://gitlab.${SECRET_DOMAIN}/
    # `secret` references the ExternalSecret target. Chart reads token
    # from Secret keys `runner-registration-token` (legacy) and
    # `runner-token` (GitLab 16+). Leave the inline values empty.
    secret: gitlab-runner-token
    runnerRegistrationToken: ""
    runnerToken: ""

    rbac:
      create: true
      clusterWideAccess: false      # SEC-02: Role/RoleBinding only, never ClusterRole
      rules:
        - apiGroups: [""]
          resources: [pods, pods/exec, pods/log, pods/attach]
          verbs: [get, list, watch, create, update, patch, delete]
        - apiGroups: [""]
          resources: [secrets, configmaps]
          verbs: [get, list, watch, create, update, patch, delete]
        - apiGroups: [""]
          resources: [events]
          verbs: [list, watch]

    serviceAccount:
      create: true
      name: gitlab-runner

    # Controller pod (gitlab-runner manager). RO root, drop ALL caps.
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop: [ALL]

    podAnnotations:
      reloader.stakater.com/auto: "true"

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # config.toml for the K8s executor — controls per-job pod security.
    runners:
      config: |
        [[runners]]
          executor = "kubernetes"
          environment = ["FF_USE_FASTZIP=true"]
          [runners.kubernetes]
            namespace = "gitlab-runner"
            image = "alpine:3.20"
            helper_image = ""                 # chart default: stock gitlab/gitlab-runner-helper (D-14)
            privileged = false                # SEC-02 / D-15 — defense in depth alongside PSS=restricted
            poll_timeout = 600
            service_account = "gitlab-runner"
            allow_privilege_escalation = false
            [runners.kubernetes.pod_security_context]
              run_as_non_root = true
              run_as_user = 1000
              fs_group = 1000
            [runners.kubernetes.build_container_security_context]
              # read_only_root_filesystem = false: Kaniko writes to /kaniko + /tmp
              # (RESEARCH P3 / T-03-03-08 accepted exception). Helper container stays RO.
              allow_privilege_escalation = false
              read_only_root_filesystem = false
              run_as_non_root = true
              [runners.kubernetes.build_container_security_context.capabilities]
                drop = ["ALL"]
            [runners.kubernetes.helper_container_security_context]
              allow_privilege_escalation = false
              read_only_root_filesystem = true
              run_as_non_root = true
              [runners.kubernetes.helper_container_security_context.capabilities]
                drop = ["ALL"]
            [[runners.kubernetes.volumes.empty_dir]]
              name = "build-tmp"
              mount_path = "/builds"
              medium = ""
            [[runners.kubernetes.volumes.empty_dir]]
              name = "tmp"
              mount_path = "/tmp"
              medium = ""

    concurrent: 4
    checkInterval: 30
