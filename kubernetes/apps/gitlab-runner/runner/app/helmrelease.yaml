---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab-runner
spec:
  interval: 1h
  chart:
    spec:
      chart: gitlab-runner
      version: 0.88.1
      sourceRef:
        kind: HelmRepository
        name: gitlab-runner
        namespace: gitlab-runner
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    gitlabUrl: https://gitlab.melotic.dev/
    # The chart's singular `secret:` value does NOT mount the named Secret
    # at /secrets/. Use the plural `secrets:` list (documented mechanism
    # for projecting external secrets) so /secrets/runner-token is populated
    # from the ExternalSecret-managed Secret. The entrypoint then exports
    # CI_SERVER_TOKEN before calling `gitlab-runner register`.
    secrets:
      - name: gitlab-runner-token
    runnerRegistrationToken: ""
    runnerToken: ""

    # The runner CLI is non-root (uid 1000) and resolves its default
    # state_file and config.toml under $HOME/.gitlab-runner/. Without HOME
    # set, it defaults to /.gitlab-runner/ which is blocked by
    # readOnlyRootFilesystem: true (observed: "Couldn't save new system ID
    # on state file" warning). The chart already mounts an emptyDir at
    # /home/gitlab-runner/.gitlab-runner, so setting HOME there makes all
    # default writes land on a writable volume — keeping ROFS enabled.
    extraEnv:
      HOME: /home/gitlab-runner

    rbac:
      create: true
      clusterWideAccess: false
      rules:
        - apiGroups: [""]
          resources: [pods, pods/exec, pods/log, pods/attach]
          verbs: [get, list, watch, create, update, patch, delete]
        - apiGroups: [""]
          resources: [secrets, configmaps]
          verbs: [get, list, watch, create, update, patch, delete]
        - apiGroups: [""]
          resources: [events]
          verbs: [list, watch]

    serviceAccount:
      create: true
      name: gitlab-runner

    # Controller pod (gitlab-runner manager).
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: [ALL]

    podAnnotations:
      reloader.stakater.com/auto: "true"

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # config.toml for the K8s executor — controls per-job pod security.
    runners:
      config: |
        [[runners]]
          executor = "kubernetes"
          # Avoid long-polling request bottleneck (chart logs WARNING when =1).
          request_concurrency = 4
          environment = ["FF_USE_FASTZIP=true"]
          [runners.kubernetes]
            namespace = "gitlab-runner"
            image = "alpine:3.20"
            helper_image = ""
            privileged = false
            poll_timeout = 600
            service_account = "gitlab-runner"
            allow_privilege_escalation = false
            [runners.kubernetes.pod_security_context]
              run_as_non_root = true
              run_as_user = 1000
              fs_group = 1000
            [runners.kubernetes.pod_security_context.seccomp_profile]
              type = "RuntimeDefault"
            [runners.kubernetes.build_container_security_context]
              allow_privilege_escalation = false
              read_only_root_filesystem = false
              run_as_non_root = true
              [runners.kubernetes.build_container_security_context.capabilities]
                drop = ["ALL"]
              [runners.kubernetes.build_container_security_context.seccomp_profile]
                type = "RuntimeDefault"
            [runners.kubernetes.helper_container_security_context]
              allow_privilege_escalation = false
              read_only_root_filesystem = true
              run_as_non_root = true
              [runners.kubernetes.helper_container_security_context.capabilities]
                drop = ["ALL"]
              [runners.kubernetes.helper_container_security_context.seccomp_profile]
                type = "RuntimeDefault"
            [[runners.kubernetes.volumes.empty_dir]]
              name = "build-tmp"
              mount_path = "/builds"
              medium = ""
            [[runners.kubernetes.volumes.empty_dir]]
              name = "tmp"
              mount_path = "/tmp"
              medium = ""

    concurrent: 4
    checkInterval: 30
