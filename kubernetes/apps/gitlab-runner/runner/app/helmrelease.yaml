---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab-runner
spec:
  interval: 1h
  chart:
    spec:
      chart: gitlab-runner
      version: 0.88.1
      sourceRef:
        kind: HelmRepository
        name: gitlab-runner
        namespace: gitlab-runner
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    gitlabUrl: https://gitlab.melotic.dev/
    # The chart's singular `secret:` value does NOT mount the named Secret
    # at /secrets/. Use the plural `secrets:` list (documented mechanism
    # for projecting external secrets) so /secrets/runner-token is populated
    # from the ExternalSecret-managed Secret. The entrypoint then exports
    # CI_SERVER_TOKEN before calling `gitlab-runner register`.
    secrets:
      - name: gitlab-runner-token
    runnerRegistrationToken: ""
    runnerToken: ""

    # The runner CLI is non-root (uid 1000) and resolves its default
    # state_file and config.toml under $HOME/.gitlab-runner/. Without HOME
    # set, it defaults to /.gitlab-runner/ which is blocked by
    # readOnlyRootFilesystem: true (observed: "Couldn't save new system ID
    # on state file" warning). The chart already mounts an emptyDir at
    # /home/gitlab-runner/.gitlab-runner, so setting HOME there makes all
    # default writes land on a writable volume — keeping ROFS enabled.
    extraEnv:
      HOME: /home/gitlab-runner

    rbac:
      create: true
      clusterWideAccess: false
      rules:
        - apiGroups: [""]
          resources: [pods, pods/exec, pods/log, pods/attach]
          verbs: [get, list, watch, create, update, patch, delete]
        - apiGroups: [""]
          resources: [secrets, configmaps]
          verbs: [get, list, watch, create, update, patch, delete]
        - apiGroups: [""]
          resources: [events]
          verbs: [list, watch]

    serviceAccount:
      create: true
      name: gitlab-runner

    # Controller pod (gitlab-runner manager).
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: [ALL]

    podAnnotations:
      reloader.stakater.com/auto: "true"

    # readOnlyRootFilesystem: true blocks the runner manager from buffering
    # job traces, which it writes under /tmp/trace* before shipping to the
    # GitLab API. Without a writable /tmp, jobs fail with "create job trace:
    # open /tmp/traceXXXX: read-only file system" and surface to the user as
    # "There has been a runner system failure, please try again."
    volumes:
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # config.toml for the K8s executor — controls per-job pod security.
    runners:
      config: |
        [[runners]]
          executor = "kubernetes"
          # Avoid long-polling request bottleneck (chart logs WARNING when =1).
          request_concurrency = 4
          # FF_USE_FASTZIP: faster artifact upload (chart-recommended).
          # DOCKER_CONFIG: defense-in-depth default for Kaniko/Buildah jobs.
          # The build pod runs as uid 1000 (PSS=restricted), but the kaniko
          # image's /kaniko directory is root-owned 0755 — so writing Docker
          # auth to the default /kaniko/.docker/config.json fails with
          # `Permission denied` in step_script. /tmp is mounted as a
          # writable emptyDir on every build pod, and kaniko's executor
          # honors $DOCKER_CONFIG ahead of its /kaniko/.docker default.
          # Setting this at the runner level means CI snippets that copy/paste
          # the upstream kaniko docs verbatim still work; CI-PATTERNS.md
          # additionally sets it per-job for explicitness.
          environment = ["FF_USE_FASTZIP=true", "DOCKER_CONFIG=/tmp/.docker"]
          [runners.kubernetes]
            namespace = "gitlab-runner"
            image = "docker.io/library/alpine:3.20"
            helper_image = ""
            # The default (alpine) helper image has no /etc/passwd entry for
            # uid 1000, so glibc's getpwuid(1000) returns NULL and git's
            # global-config lookup falls back to HOME='/'. Git then tries to
            # lock '//.gitconfig', which fails with EACCES (or EROFS, depending
            # on whether helper rootfs is read-only). The ubuntu-flavored
            # helper image ships an `ubuntu:x:1000:1000:Ubuntu:/home/ubuntu`
            # entry with /home/ubuntu pre-created (mode 0750, owner 1000:1000),
            # giving uid 1000 a real, writable HOME.
            helper_image_flavor = "ubuntu"
            privileged = false
            poll_timeout = 600
            service_account = "gitlab-runner"
            allow_privilege_escalation = false
            [runners.kubernetes.pod_security_context]
              run_as_non_root = true
              run_as_user = 1000
              fs_group = 1000
            [runners.kubernetes.pod_security_context.seccomp_profile]
              type = "RuntimeDefault"
            [runners.kubernetes.build_container_security_context]
              allow_privilege_escalation = false
              read_only_root_filesystem = false
              run_as_non_root = true
              [runners.kubernetes.build_container_security_context.capabilities]
                drop = ["ALL"]
              [runners.kubernetes.build_container_security_context.seccomp_profile]
                type = "RuntimeDefault"
            [runners.kubernetes.helper_container_security_context]
              allow_privilege_escalation = false
              # The helper container runs `git` which writes ~/.gitconfig.
              # Under PSS run_as_non_root the runtime UID has no /etc/passwd
              # entry, so HOME resolves to "/", which fails with ROFS.
              read_only_root_filesystem = false
              run_as_non_root = true
              [runners.kubernetes.helper_container_security_context.capabilities]
                drop = ["ALL"]
              [runners.kubernetes.helper_container_security_context.seccomp_profile]
                type = "RuntimeDefault"
            # The auto-injected init-permissions container only drops NET_RAW by
            # default, which violates the namespace's restricted PSS. Mirror the
            # helper container's hardened context so build pods are admitted.
            [runners.kubernetes.init_permissions_container_security_context]
              allow_privilege_escalation = false
              read_only_root_filesystem = true
              run_as_non_root = true
              [runners.kubernetes.init_permissions_container_security_context.capabilities]
                drop = ["ALL"]
              [runners.kubernetes.init_permissions_container_security_context.seccomp_profile]
                type = "RuntimeDefault"
            [[runners.kubernetes.volumes.empty_dir]]
              name = "build-tmp"
              mount_path = "/builds"
              medium = ""
            [[runners.kubernetes.volumes.empty_dir]]
              name = "tmp"
              mount_path = "/tmp"
              medium = ""

    concurrent: 4
    checkInterval: 30
