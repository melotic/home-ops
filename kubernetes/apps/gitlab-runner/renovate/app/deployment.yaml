---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/v1.35.0-standalone-strict/deployment-apps-v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: renovate
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: renovate
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        app.kubernetes.io/name: renovate
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["k8s-ghost"]
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: renovate
          image: ghcr.io/mend/renovate-ce:15.0.0-full@sha256:6ee8e044233feaecd8a11ce5205225ea40e0918aabaefc9d8088ed739cea5e01
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MEND_RNV_PLATFORM
              value: gitlab
            - name: MEND_RNV_ENDPOINT
              value: https://gitlab.melotic.dev/api/v4/
            - name: MEND_RNV_ACCEPT_TOS
              value: "y"
            - name: MEND_RNV_WEBHOOK_URL
              value: https://renovate-webhook.melotic.dev/webhook
            - name: MEND_RNV_CRON_JOB_SCHEDULER_ALL
              value: "0 * * * *"
            - name: MEND_RNV_CRON_APP_SYNC
              value: "0 */4 * * *"
            - name: MEND_RNV_DATA_HANDLER_TYPE
              value: postgresql
            - name: PGHOST
              value: postgres-cluster-pooler-rw.database.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: renovate
            - name: PGUSER
              value: renovate
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: renovate-postgres
                  key: password
            - name: MEND_RNV_GITLAB_PAT
              valueFrom:
                secretKeyRef:
                  name: renovate
                  key: MEND_RNV_GITLAB_PAT
            - name: MEND_RNV_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: renovate
                  key: MEND_RNV_LICENSE_KEY
            - name: MEND_RNV_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: renovate
                  key: MEND_RNV_WEBHOOK_SECRET
            - name: MEND_RNV_AUTODISCOVER_FILTER
              valueFrom:
                secretKeyRef:
                  name: renovate
                  key: MEND_RNV_AUTODISCOVER_FILTER
            - name: GITHUB_COM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-status-token-secret
                  key: token
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 60
          livenessProbe:
            initialDelaySeconds: 2
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: tmp
          emptyDir: {}
