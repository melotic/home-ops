---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-minio-bucket-init
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2025-04-03T17-07-56Z
          envFrom:
            - secretRef:
                name: gitlab-minio-creds
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              export HOME=/tmp
              for i in $(seq 1 60); do
                if mc alias set local http://gitlab-minio.gitlab.svc.cluster.local:9000 \
                    "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; then
                  break
                fi
                sleep 5
              done
              mc alias list local >/dev/null
              for b in gitlab-artifacts gitlab-lfs gitlab-uploads gitlab-packages \
                       gitlab-mr-diffs gitlab-tf-state gitlab-ci-secure \
                       gitlab-dep-proxy gitlab-backups gitlab-tmp; do
                mc mb -p "local/$b" || true
              done
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
