---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-minio-data
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 200Gi
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-minio
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gitlab-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-minio
  labels:
    app.kubernetes.io/name: gitlab-minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gitlab-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitlab-minio
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
          args: ["server", "/data", "--console-address", ":9001"]
          envFrom:
            - secretRef:
                name: gitlab-minio-creds
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitlab-minio-data
        - name: tmp
          emptyDir: {}
---
# One-shot bucket creator. Idempotent. Re-run via `kubectl delete job
# gitlab-minio-bucket-init -n gitlab` followed by Flux reconcile.
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-minio-bucket-init
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2025-04-03T17-07-56Z
          envFrom:
            - secretRef:
                name: gitlab-minio-creds
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              export HOME=/tmp
              until mc alias set local http://gitlab-minio.gitlab.svc.cluster.local:9000 \
                  "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                sleep 3
              done
              for b in gitlab-artifacts gitlab-lfs gitlab-uploads gitlab-packages \
                       gitlab-mr-diffs gitlab-tf-state gitlab-ci-secure \
                       gitlab-dep-proxy gitlab-backups gitlab-tmp; do
                mc mb -p "local/$b" || true
              done
              mc ls local
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
