# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab-minio
spec:
  chartRef:
    kind: OCIRepository
    name: gitlab-minio
  interval: 1h
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      gitlab-minio:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/minio/minio
              tag: RELEASE.2025-04-08T15-41-24Z
            args:
              - server
              - /data
              - --console-address
              - ":9001"
            envFrom:
              - secretRef:
                  name: gitlab-minio-creds
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /minio/health/ready
                    port: &api 9000
                  initialDelaySeconds: 10
                  periodSeconds: 10
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /minio/health/live
                    port: *api
                  initialDelaySeconds: 30
                  periodSeconds: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 1Gi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: gitlab-minio
        ports:
          api:
            port: *api
          console:
            port: 9001
    persistence:
      data:
        accessMode: ReadWriteOnce
        size: 200Gi
        storageClass: longhorn
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
