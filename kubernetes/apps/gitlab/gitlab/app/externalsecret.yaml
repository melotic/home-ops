---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-initial-root-password
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  refreshInterval: 5m
  target:
    name: gitlab-initial-root-password
  data:
    - secretKey: password
      remoteRef:
        key: gitlab-initial-root-password
        property: password
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-minio-creds
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  refreshInterval: 5m
  target:
    name: gitlab-minio-creds
    template:
      type: Opaque
      data:
        MINIO_ROOT_USER: "{{ .root_user }}"
        MINIO_ROOT_PASSWORD: "{{ .root_password }}"
        accesskey: "{{ .access_key }}"
        secretkey: "{{ .secret_key }}"
  dataFrom:
    - extract:
        key: gitlab-minio
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-object-store-connection
spec:
  secretStoreRef:
    kind: SecretStore
    name: gitlab-rgw
  refreshInterval: 5m
  target:
    name: gitlab-object-store-connection
    template:
      engineVersion: v2
      type: Opaque
      data:
        connection: |
          provider: AWS
          region: us-east-1
          aws_access_key_id: {{ .AccessKey | quote }}
          aws_secret_access_key: {{ .SecretKey | quote }}
          endpoint: {{ .Endpoint | quote }}
          path_style: true
        s3cfg: |
          [default]
          access_key = {{ .AccessKey }}
          secret_key = {{ .SecretKey }}
          host_base = {{ .Endpoint | trimPrefix "https://" | trimPrefix "http://" }}
          host_bucket = {{ .Endpoint | trimPrefix "https://" | trimPrefix "http://" }}/%(bucket)
          use_https = {{ if hasPrefix "https://" .Endpoint }}True{{ else }}False{{ end }}
          signature_v2 = False
  data:
    - secretKey: AccessKey
      remoteRef:
        key: rook-ceph-object-user-gitlab-rgw-gitlab-rgw
        property: AccessKey
    - secretKey: SecretKey
      remoteRef:
        key: rook-ceph-object-user-gitlab-rgw-gitlab-rgw
        property: SecretKey
    - secretKey: Endpoint
      remoteRef:
        key: rook-ceph-object-user-gitlab-rgw-gitlab-rgw
        property: Endpoint
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-oidc
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  refreshInterval: 5m
  target:
    name: gitlab-oidc
    template:
      type: Opaque
      data:
        provider: |
          name: openid_connect
          label: Authentik
          args:
            name: openid_connect
            scope: [openid, profile, email, groups]
            response_type: code
            issuer: https://sso.melotic.dev/application/o/gitlab/
            discovery: true
            client_auth_method: query
            uid_field: preferred_username
            client_options:
              identifier: {{ .client_id | quote }}
              secret: {{ .client_secret | quote }}
              redirect_uri: https://gitlab.melotic.dev/users/auth/openid_connect/callback
            gitlab:
              admin_groups: ["gitlab-admins"]
  data:
    - secretKey: client_id
      remoteRef:
        key: authentik-oidc
        property: gitlab_client_id
    - secretKey: client_secret
      remoteRef:
        key: authentik-oidc
        property: gitlab_client_secret
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-webservice-setup-script
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  refreshInterval: 5m
  target:
    name: gitlab-webservice-setup-script
    template:
      type: Opaque
      data:
        setup.sh: "{{ .setup_script }}"
  data:
    - secretKey: setup_script
      remoteRef:
        key: gitlab-minio
        property: setup_script
