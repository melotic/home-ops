---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab
spec:
  interval: 1h
  chart:
    spec:
      chart: gitlab
      version: 9.11.1
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: gitlab
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      edition: ce
      hosts:
        domain: ${SECRET_DOMAIN}
        https: true
        externalIP: ""
        gitlab:
          name: gitlab.${SECRET_DOMAIN}
        ssh: ssh.gitlab.${SECRET_DOMAIN}
      ingress:
        configureCertmanager: false
        provider: none
        enabled: false
        tls:
          enabled: false
      psql:
        host: postgres-cluster-rw.database.svc.cluster.local
        port: 5432
        database: gitlab
        username: app
        password:
          secret: postgres-cluster-app
          key: password
      redis:
        host: dragonfly.database.svc.cluster.local
        port: 6379
        password:
          enabled: false
        cache:
          host: dragonfly.database.svc.cluster.local
          port: 6379
          database: 8
        queues:
          host: dragonfly.database.svc.cluster.local
          port: 6379
          database: 9
        sharedState:
          host: dragonfly.database.svc.cluster.local
          port: 6379
          database: 10
        sessions:
          host: dragonfly.database.svc.cluster.local
          port: 6379
          database: 11
      minio:
        enabled: false
      registry:
        enabled: false   # D-04: built-in registry DISABLED; CI pushes to harbor.melotic.dev
      appConfig:
        object_store:
          enabled: true
          connection:
            secret: gitlab-object-store-connection
            key: connection
        lfs:
          enabled: true
          bucket: gitlab-lfs
        artifacts:
          enabled: true
          bucket: gitlab-artifacts
        uploads:
          enabled: true
          bucket: gitlab-uploads
        packages:
          enabled: true
          bucket: gitlab-packages
        externalDiffs:
          enabled: true
          bucket: gitlab-mr-diffs
        terraformState:
          enabled: true
          bucket: gitlab-tf-state
        ciSecureFiles:
          enabled: true
          bucket: gitlab-ci-secure
        dependencyProxy:
          enabled: true
          bucket: gitlab-dep-proxy
        backups:
          bucket: gitlab-backups
          tmpBucket: gitlab-tmp
          connection:
            secret: gitlab-object-store-connection
            key: connection
        omniauth:
          enabled: true
          autoSignInWithProvider: openid_connect
          syncProfileFromProvider: [openid_connect]
          syncProfileAttributes: [name, email]
          allowSingleSignOn: [openid_connect]
          blockAutoCreatedUsers: false
          providers:
            - secret: gitlab-oidc
              key: provider
      initialRootPassword:
        secret: gitlab-initial-root-password
        key: password
      shell:
        port: 22
      kas:
        enabled: false
    # --- Subchart toggles: turn off everything we replace ---
    installCertmanager: false   # disables aliased cert-manager subchart (Chart.yaml condition)
    nginx-ingress:
      enabled: false
    prometheus:
      install: false
    redis:
      install: false
    postgresql:
      install: false
    minio:
      install: false
    gitlab-runner:
      install: false
    # --- Keep these — they ARE GitLab itself ---
    gitlab:
      webservice:
        ingress:
          enabled: false
        service:
          type: ClusterIP
        minReplicas: 1
        maxReplicas: 2
        resources:
          requests:
            cpu: 500m
            memory: 1.5Gi
          limits:
            cpu: 2
            memory: 3Gi
      sidekiq:
        minReplicas: 1
        maxReplicas: 1
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: 1
            memory: 2Gi
      gitaly:
        persistence:
          enabled: true
          size: 50Gi
          storageClass: longhorn
          accessMode: ReadWriteOnce
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 1Gi
      toolbox:
        backups:
          objectStorage:
            config:
              secret: gitlab-object-store-connection
              key: s3cfg
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      gitlab-shell:
        service:
          type: LoadBalancer
          annotations:
            external-dns.alpha.kubernetes.io/hostname: ssh.gitlab.${SECRET_DOMAIN}
            # Operator: replace placeholder below with the LBIPAM IPv4 reserved
            # for ssh.gitlab.melotic.dev before first apply (see SUMMARY).
            lbipam.cilium.io/ips: "REPLACE-WITH-RESERVED-LBIPAM-IPv4"
          port: 22
          targetPort: 2222
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
    # D-04: built-in registry DISABLED — CI pushes to harbor.melotic.dev via per-group robot accounts.
    # No PVC, no HPA, no Service, no HTTPRoute for this subchart.
    registry:
      enabled: false
