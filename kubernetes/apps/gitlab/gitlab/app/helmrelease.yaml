---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab
spec:
  interval: 1h
  chart:
    spec:
      chart: gitlab
      version: 9.11.1
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: gitlab
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      edition: ce
      hosts:
        domain: melotic.dev
        https: true
        externalIP: ""
        gitlab:
          name: gitlab.melotic.dev
        ssh: ssh.gitlab.melotic.dev
      ingress:
        configureCertmanager: false
        provider: none
        enabled: false
        tls:
          enabled: false
      psql:
        host: postgres-cluster-rw.database.svc.cluster.local
        port: 5432
        database: gitlab
        username: app
        password:
          secret: postgres-cluster-app
          key: password
      redis:
        host: dragonfly.database.svc.cluster.local
        port: 6379
        password:
          enabled: false
        cache:
          host: dragonfly.database.svc.cluster.local
          port: 6379
          database: 9
        queues:
          host: dragonfly.database.svc.cluster.local
          port: 6379
          database: 10
        sharedState:
          host: dragonfly.database.svc.cluster.local
          port: 6379
          database: 11
        sessions:
          host: dragonfly.database.svc.cluster.local
          port: 6379
          database: 12
      minio:
        enabled: false
      registry:
        enabled: false
      appConfig:
        object_store:
          enabled: true
          connection:
            secret: gitlab-object-store-connection
            key: connection
        lfs:
          enabled: true
          bucket: gitlab-lfs
        artifacts:
          enabled: true
          bucket: gitlab-artifacts
        uploads:
          enabled: true
          bucket: gitlab-uploads
        packages:
          enabled: true
          bucket: gitlab-packages
        externalDiffs:
          enabled: true
          bucket: gitlab-mr-diffs
        terraformState:
          enabled: true
          bucket: gitlab-tf-state
        ciSecureFiles:
          enabled: true
          bucket: gitlab-ci-secure
        dependencyProxy:
          enabled: true
          bucket: gitlab-dep-proxy
        backups:
          bucket: gitlab-backups
          tmpBucket: gitlab-tmp
          connection:
            secret: gitlab-object-store-connection
            key: connection
        omniauth:
          enabled: true
          autoSignInWithProvider: openid_connect
          syncProfileFromProvider: [openid_connect]
          syncProfileAttributes: [name, email]
          allowSingleSignOn: [openid_connect]
          blockAutoCreatedUsers: false
          providers:
            - secret: gitlab-oidc
              key: provider
      initialRootPassword:
        secret: gitlab-initial-root-password
        key: password
      shell:
        port: 22
      kas:
        enabled: false
    installCertmanager: false
    nginx-ingress:
      enabled: false
    prometheus:
      install: false
    redis:
      install: false
    postgresql:
      install: false
    minio:
      install: false
    gitlab-runner:
      install: false
    gitlab:
      webservice:
        ingress:
          enabled: false
        service:
          type: ClusterIP
        minReplicas: 1
        maxReplicas: 2
        resources:
          requests:
            cpu: 500m
            memory: 1.5Gi
          limits:
            cpu: 2
            memory: 3Gi
      sidekiq:
        minReplicas: 1
        maxReplicas: 1
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: 1
            memory: 2Gi
      gitaly:
        persistence:
          enabled: true
          size: 50Gi
          storageClass: longhorn
          accessMode: ReadWriteOnce
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 1Gi
      toolbox:
        backups:
          objectStorage:
            config:
              secret: gitlab-object-store-connection
              key: s3cfg
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      gitlab-shell:
        service:
          type: LoadBalancer
          annotations:
            external-dns.alpha.kubernetes.io/hostname: ssh.gitlab.melotic.dev
          internalPort: 2222
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
    registry:
      enabled: false
