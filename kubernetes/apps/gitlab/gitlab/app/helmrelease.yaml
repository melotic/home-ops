---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: gitlab
  namespace: gitlab
spec:
  interval: 15m
  url: https://charts.gitlab.io
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: gitlab
      version: 10.0.1
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: gitlab
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  postRenderers:
    - kustomize:
        patches:
          # Inject postStart lifecycle hook on the webservice container to run
          # the sensitive setup script against the same /srv/gitlab as puma.
          # Must redeclare preStop so the strategic merge does not drop the
          # chart's hardcoded graceful-shutdown hook.
          - target:
              kind: Deployment
              name: gitlab-webservice-default
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: gitlab-webservice-default
              spec:
                template:
                  spec:
                    containers:
                      - name: webservice
                        lifecycle:
                          postStart:
                            exec:
                              command:
                                - /bin/bash
                                - -c
                                - bash /var/run/secrets/gitlab-setup/setup.sh
                          preStop:
                            exec:
                              command:
                                - /bin/bash
                                - -c
                                - pkill -SIGINT -o ruby
  values:
    global:
      edition: ee
      hosts:
        domain: melotic.dev
        https: true
        externalIP: ""
        gitlab:
          name: gitlab.melotic.dev
        ssh: gitlab.melotic.dev
      ingress:
        configureCertmanager: false
        provider: none
        enabled: false
        tls:
          enabled: false
      gatewayApi:
        enabled: true
        gatewayRef:
          name: envoy-internal
          namespace: network
        installEnvoy: false
        configureCertmanager: false
        httpToHttpsRedirect: false
      psql:
        host: postgres-cluster-rw.database.svc.cluster.local
        port: 5432
        database: gitlab
        username: gitlab
        password:
          secret: gitlab-postgres
          key: password
      redis:
        host: dragonfly.database.svc.cluster.local
        port: 6379
        password:
          enabled: false
        cache:
          host: dragonfly.database.svc.cluster.local
          port: 6379
          database: 9
        queues:
          host: dragonfly.database.svc.cluster.local
          port: 6379
          database: 10
        sharedState:
          host: dragonfly.database.svc.cluster.local
          port: 6379
          database: 11
        sessions:
          host: dragonfly.database.svc.cluster.local
          port: 6379
          database: 12
      minio:
        enabled: false
      registry:
        enabled: false
      smtp:
        enabled: true
        address: smtp-relay.default.svc.cluster.local
        port: 587
        authentication: none
        starttls_auto: false
        openssl_verify_mode: none
      appConfig:
        enableUsagePing: false
        enableSeatLink: false
        object_store:
          enabled: true
          connection:
            secret: gitlab-object-store-connection
            key: connection
        lfs:
          enabled: true
          bucket: gitlab-lfs
        artifacts:
          enabled: true
          bucket: gitlab-artifacts
        uploads:
          enabled: true
          bucket: gitlab-uploads
        packages:
          enabled: true
          bucket: gitlab-packages
        externalDiffs:
          enabled: true
          bucket: gitlab-mr-diffs
        terraformState:
          enabled: true
          bucket: gitlab-tf-state
        ciSecureFiles:
          enabled: true
          bucket: gitlab-ci-secure
        dependencyProxy:
          enabled: true
          bucket: gitlab-dep-proxy
        backups:
          bucket: gitlab-backups
          tmpBucket: gitlab-tmp
          connection:
            secret: gitlab-object-store-connection
            key: connection
        omniauth:
          enabled: true
          autoSignInWithProvider: openid_connect
          syncProfileFromProvider: [openid_connect]
          syncProfileAttributes: [name, email]
          allowSingleSignOn: [openid_connect]
          blockAutoCreatedUsers: true
          providers:
            - secret: gitlab-oidc
              key: provider
            - secret: gitlab-github-oauth
              key: github
        initialDefaults:
          signupEnabled: false
          gitlabProductUsageData: false
      initialRootPassword:
        secret: gitlab-initial-root-password
        key: password
      shell:
        port: 22
      kas:
        enabled: false
    installCertmanager: false
    nginx-ingress:
      enabled: false
    prometheus:
      install: false
    redis:
      install: false
    postgresql:
      install: false
    minio:
      install: false
    gitlab-runner:
      install: false
    gitlab:
      webservice:
        gatewayRoute:
          sectionName: https
        ingress:
          enabled: false
        service:
          type: ClusterIP
        minReplicas: 1
        maxReplicas: 2
        resources:
          requests:
            cpu: 500m
            memory: 1.5Gi
          limits:
            memory: 3Gi
        extraEnv:
          MALLOC_CONF: dirty_decay_ms:1000,muzzy_decay_ms:1000
        extraVolumes: |
          - name: gitlab-setup-script
            secret:
              secretName: gitlab-webservice-setup-script
              defaultMode: 0500
              items:
                - key: setup.sh
                  path: setup.sh
        extraVolumeMounts: |
          - name: gitlab-setup-script
            mountPath: /var/run/secrets/gitlab-setup/setup.sh
            subPath: setup.sh
            readOnly: true
        workerProcesses: 0
      sidekiq:
        concurrency: 5
        extraEnv:
          MALLOC_CONF: dirty_decay_ms:1000,muzzy_decay_ms:1000
        minReplicas: 1
        maxReplicas: 1
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            memory: 2Gi
      gitlab-exporter:
        enabled: false
      gitaly:
        extraEnv:
          MALLOC_CONF: dirty_decay_ms:1000,muzzy_decay_ms:1000
          GITALY_COMMAND_SPAWN_MAX_PARALLEL: "2"
        configuration:
          concurrency:
            - rpc: "/gitaly.SmartHTTPService/PostReceivePack"
              max_per_repo: 3
            - rpc: "/gitaly.SSHService/SSHUploadPack"
              max_per_repo: 3
        persistence:
          enabled: true
          size: 50Gi
          storageClass: ceph-block
          accessMode: ReadWriteOnce
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 1Gi
      toolbox:
        backups:
          objectStorage:
            config:
              secret: gitlab-object-store-connection
              key: s3cfg
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
      gitlab-shell:
        gatewayRoute:
          enabled: true
          sectionName: gitlab-ssh
        service:
          type: ClusterIP
          internalPort: 2222
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
    registry:
      enabled: false
