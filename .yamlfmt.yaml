---
doublestar: true # enable ** globs in include/exclude
gitignore_excludes: true # auto-exclude root-.gitignore paths (.planning/, .venv/, kubeconfig, .task/)
include:
  - "**/*.yaml" # config-driven scan target (CRITICAL: with doublestar a bare `.` matches nothing)
  - "**/*.yml"
exclude:
  - "**/*.sops.yaml" # CI-02: never read/rewrite encrypted files
  - "talos/clusterconfig/**" # generated by talhelper; nested .gitignore is not honored by gitignore_excludes
formatter:
  type: basic
  include_document_start: true # CRITICAL: repo uses leading `---`; without this 533 files churn
  retain_line_breaks_single: true # preserve intentional blank-line grouping
  scan_folded_as_literal: true # don't mangle `>` folded blocks
  eof_newline: true
  trim_trailing_whitespace: true
  line_ending: lf
