          # --- rootless BuildKit additions ---
          # Allowed unconditionally because the build pod drops ALL caps; the
          # runtime-default profile only allows these when CAP_SYS_ADMIN is held, which
          # a static seccomp filter cannot express. Covers userns + mount-namespace
          # setup, classic mount(2)/umount2(2), and the modern mount API (open_tree,
          # move_mount, mount_setattr, fsopen/fsconfig/fsmount/fspick) used by
          # containerd/BuildKit's overlayfs + idmapped-mount paths. (RESEARCH Pattern 1,
          # rubber-duck coverage review.)
          - action: SCMP_ACT_ALLOW
            names:
              - clone
              - clone3
              - unshare
              - setns
              - mount
              - umount
              - umount2
              - pivot_root
              - chroot
              - keyctl
              - add_key
              - request_key
              - fsopen
              - fsconfig
              - fsmount
              - fspick
