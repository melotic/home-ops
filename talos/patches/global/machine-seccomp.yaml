  # Custom Localhost seccomp profile for rootless BuildKit (CI-01).
  #
  # Talos writes the `value` below verbatim as JSON to
  # /var/lib/kubelet/seccomp/profiles/buildkit.json on every node; pods reference it
  # via seccompProfile.type=Localhost, localhostProfile=profiles/buildkit.json.
  #
  # FORMAT: this MUST be the OCI runtime-spec `LinuxSeccomp` shape (flat
  # `architectures` list + `syscalls` with `names`/`action`). containerd loads a
  # Kubernetes Localhost profile via contrib/seccomp.WithProfile, which json.Unmarshals
  # straight into specs.LinuxSeccomp — it does NOT understand Docker's higher-level
  # `archMap`/`includes`/`excludes` fields and would silently drop them.
  #
  # CONTENT: the containerd/runtime-default deny-by-default allow set
  # (defaultAction=SCMP_ACT_ERRNO) PLUS an unconditional allow of the syscalls rootless
  # BuildKit needs to build a user namespace and an overlayfs snapshotter. The
  # runtime-default profile gates those behind CAP_SYS_ADMIN; the build pod drops ALL
  # caps and runs runAsNonRoot, so a static seccomp filter cannot express the
  # capability gate — they are allowed unconditionally here. The kernel still enforces
  # user-namespace, mount-namespace, and capability constraints. Scope: BuildKit job
  # pods only — do NOT reuse as a cluster-wide profile (RESEARCH Pattern 1 / Pitfall 1,
  # T-16-SECCOMP-WIDE). Architectures cover only the cluster's amd64 nodes.
  seccompProfiles:
    - name: buildkit.json
      value:
        defaultAction: SCMP_ACT_ERRNO
        architectures:
          - SCMP_ARCH_X86_64
          - SCMP_ARCH_X86
          - SCMP_ARCH_X32
        syscalls:
          # --- containerd/moby runtime-default unconditional allow set ---
          - action: SCMP_ACT_ALLOW
            names:
              - accept
              - accept4
              - access
              - adjtimex
              - alarm
              - arch_prctl
              - bind
              - brk
              - capget
              - capset
              - chdir
              - chmod
              - chown
              - chown32
              - clock_adjtime
              - clock_adjtime64
              - clock_getres
              - clock_getres_time64
              - clock_gettime
              - clock_gettime64
              - clock_nanosleep
              - clock_nanosleep_time64
              - close
              - close_range
